  </div>
  <div style="width:160px;height:3px;background:rgba(120,80,180,0.15);border-radius:99px;overflow:hidden;">
    <div id="boot-bar" style="height:100%;width:0%;background:#e8473f;border-radius:99px;transition:width 0.4s ease;"></div>
  </div>
  <div id="boot-error" style="display:none;max-width:420px;text-align:center;padding:16px 20px;
    background:rgba(232,71,63,0.08);border:1px solid rgba(232,71,63,0.25);border-radius:12px;
    color:#f08080;font-size:0.82rem;line-height:1.7;margin-top:8px;">
  </div>
</div>

<noscript>
  <div style="position:fixed;inset:0;background:#f0edf8;display:flex;align-items:center;
    justify-content:center;font-family:system-ui,sans-serif;color:#9b9aaa;text-align:center;padding:40px;">
    <div>

function rrect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}
const normaliseAns=s=>{
  if(!s)return"";let v=String(s).trim().toLowerCase().replace(/\s+/g," ");
  const wu=v.replace(/\s*(cm|mm|m|km|kg|g|ml|l|°c|°|%|mph|m\/s)\s*$/i,"").trim();
  const fm=wu.match(/^(-?\d+)\s*\/\s*(-?\d+)$/);
  if(fm){const d=parseFloat(fm[1])/parseFloat(fm[2]);if(!isNaN(d))v=String(Math.round(d*10000)/10000);}
  v=v.replace(/\s*\+\s*/g,"+").replace(/\s*-\s*/g,"-").replace(/\s*\*\s*/g,"*");
  v=v.replace(/(\d)\s+([a-z])/g,"$1$2").replace(/([a-z])\s+(\d)/g,"$2$1");
  return v;
};
const withinTol=(ans,target,tol=0.01)=>{const a=parseFloat(ans),t=parseFloat(target);return!isNaN(a)&&!isNaN(t)&&Math.abs(a-t)<=tol;};

const parseJSON = t => {
  const s = t.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  const first = Math.min(...['[','{'].map(c=>s.indexOf(c)<0?Infinity:s.indexOf(c)));
  const last  = Math.max(s.lastIndexOf('}'), s.lastIndexOf(']'));
  if(first===Infinity||last===-1) throw new Error("No JSON found in response");
  return JSON.parse(s.slice(first,last+1));
};

  const hashPin = async (pin) => {
    if (!pin) return "";
    const enc = new TextEncoder().encode(pin + "nv-salt-2026");
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,16);
  };

  const verifyPin = async (entry, stored) => {

  const computeChecksum = (parts) => {
    const str = parts.join("-");
    let h = 1314278733;
    for (let i=0; i<str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 0x9e3779b9);
      h ^= (h >>> 16);
    }
    const n = ((h >>> 0) % 9801);  // 0..9800 → two base-99 digits
    const d1 = Math.floor(n / 99).toString(36).toUpperCase();
    const d2 = (n % 99).toString(36).toUpperCase();
    return (d1+d2).padStart(3,"0");
  };

  const validateLicence = useCallback((raw) => {
    setLicenceError("");
    const key = raw.trim().toUpperCase().replace(/\s+/g,"");
    if (!key) { setLicenceError("Please enter a licence key."); return; }

    const parts = key.split("-");
    if (parts.length < 6 || parts[0] !== "NV") {
      setLicenceError("Invalid key format. Keys look like: NV-SCH-2026-12-SCHOOL-XX");
      return;
    }

    const [prefix, tier, year, month, school, checksum] = parts;
    const mainParts = [prefix, tier, year, month, school];
    const expectedCs = computeChecksum(mainParts);

    if (checksum !== expectedCs) {
      setLicenceError("Key is invalid or has been altered. Contact hello@novavista.ai for a new key.");
      return;
    }

    const tierName = VALID_TIERS[tier];
    if (!tierName) {
      setLicenceError("Unknown licence tier. Valid tiers: TCH, DEP, SCH.");
      return;
    }

    const expYear  = parseInt(year, 10);
    const expMonth = parseInt(month, 10);
    const now = new Date();
    const expiryDate = new Date(expYear, expMonth, 0); // last day of expiry month
    const expired = now > expiryDate;

    setLicenceKey(key);
    setLicenceTier(tierName);
    setLicenceSchool(school);
    setLicenceExpiry(`${expMonth.toString().padStart(2,"0")}/${year}`);
    setLicenceStatus(expired ? "expired" : "active");
    setLicenceInput("");

      setLicenceError(`This licence expired ${expMonth.toString().padStart(2,"0")}/${year}. Renew at novavista.ai`);
    }
  }, []);

  const withRetry = async (fn, retries=2, baseDelay=800) => {
    for (let attempt=0; attempt<=retries; attempt++) {
      try { return await fn(); }
      catch(e) {
        const isRetryable = e.message && (
          e.message.includes("529") ||   // Anthropic overloaded
          e.message.includes("503") ||   // Service unavailable
          e.message.includes("502") ||   // Bad gateway
          e.message.includes("rate") ||  // Rate limited
          e.message.includes("timeout")
        );
        if (!isRetryable || attempt === retries) throw e;
        const delay = baseDelay * Math.pow(2, attempt) + Math.random()*400;
        await new Promise(r => setTimeout(r, delay));
      }
    }
  };

  const callAPI = useCallback(async(messages, system, maxTokens=1500) => {

    if (offlineMode) {
      await new Promise(r => setTimeout(r, 400 + Math.random()*300));

      const isMarkWhole = system && system.includes('"totalScore"');
      const isExtract   = system && system.includes('"canRead"');
      const isQmMark    = system && system.includes('"marksAwarded"') && system.includes('"breakdown"');
      const isBatch     = system && system.includes('Only award marks');
      const isScheme    = system && system.includes('per-question sections');
      const isDetectQ   = system && system.includes('which question');
      const isOcr       = system && system.includes('Extract and list');

      const localMark = (answerText, scheme, maxMarks) => {
        const ans = (answerText||"").toLowerCase();
        const scheme_ = scheme || globalScheme || "";
        const lines   = scheme_.split(/\n/).map(l=>l.trim()).filter(Boolean);

        const ruleResults = [];
        Object.entries(markingRules).forEach(([qId,rules])=>{
          rules.forEach(rule=>{
            const allMet = rule.conditions.every(c=>{
              const v = (c.value||"").toLowerCase();
              if(c.field==="answer"){
                if(c.op==="contains")     return ans.includes(v);
                if(c.op==="not_contains") return !ans.includes(v);
                if(c.op==="starts")       return ans.startsWith(v);
                if(c.op==="regex"){try{return new RegExp(v,"i").test(ans);}catch{return false;}}
              }
              if(c.field==="number"){
                const nums=ans.match(/-?[\d.]+/g)?.map(Number)||[];
                const tv=parseFloat(v);
                if(c.op==="equals")  return nums.some(n=>Math.abs(n-tv)<0.001);
                if(c.op==="between"){const[mn,mx]=(c.value||"").split(",").map(Number);return nums.some(n=>n>=mn&&n<=mx);}
                if(c.op==="gt")      return nums.some(n=>n>tv);
                if(c.op==="lt")      return nums.some(n=>n<tv);
              }
              if(c.field==="length"){
                const wc=ans.split(/\s+/).filter(Boolean).length;
                const tv=parseInt(v)||0;
                if(c.op==="gt") return wc>tv;
                if(c.op==="lt") return wc<tv;
                if(c.op==="equals") return wc===tv;
              }
              return false;
            });
            if(allMet) ruleResults.push({code:rule.code||"B1",text:`Rule: ${rule.conditions.map(c=>c.value).join(" AND ")}`,awarded:true,marks:rule.marks||1});
          });
        });

        const calcResults = [];
        Object.entries(calcChecks).forEach(([qId,cc])=>{
          if(!cc.answer) return;
          const expected = parseFloat(cc.answer);
          const tol      = parseFloat(cc.tolerance)||0;
          const nums     = ans.match(/-?[\d.]+/g)?.map(Number)||[];
          const normAns = normaliseAns(answerText);
          const normNum = parseFloat(normAns);
          const hit     = nums.some(n=>Math.abs(n-expected)<=tol)
                       || (!isNaN(normNum) && Math.abs(normNum-expected)<=tol);
          const hasWorking = ans.includes("/") || ans.includes("×") || ans.includes("*") || ans.includes("=") || ans.includes("+") || ans.includes("-") || /\d+\s*[÷×]\s*\d+/.test(ans);
          if(hit) calcResults.push({code:"A1",text:`Correct answer: ${expected}${cc.units?" "+cc.units:""}`,awarded:true,marks:parseInt(cc.marks)||1});
          if(!hit&&hasWorking) calcResults.push({code:"M1",text:`Method shown for ${qId}`,awarded:true,marks:1});
        });

        const stopWords = new Set(["the","a","an","and","or","of","to","in","is","are","was","were","it","its","for","on","at","by","as","with","from","that","this","be","been","being","have","has","had","do","does","did","will","would","can","could","should","not","no","all","any","each","per","use","used","show","shown","give","given","required","needed","through","using","energy","correct","named","examples","least"]);
        const keywords = w => w.toLowerCase().match(/\b[a-z]{4,}\b/g)?.filter(w=>!stopWords.has(w)) || [];

        const extractNums = str => { const cleaned=(str||'').replace(/(\d),(\d)/g,'$1$2'); return (cleaned.match(/-?[\d]+(?:\.\d+)?/g)||[]).map(Number); };

        const points = [];
        lines.forEach(line=>{
          const stripped = line
            .replace(/^Q(?:n|uestion)?\s*\d+[a-z]?[\s\)\.:\-]*/i,"")
            .replace(/^\d+[a-z]?[\.\)\s]+/,"")
            .replace(/^[a-z][\)\.]\s*/i,"").replace(/^\([a-z]\)\s*/i,"")
            .replace(/^Part\s+[a-z]\s*/i,"")
            .trim();
          if(!stripped || stripped.length < 3) return;

          const codeMatch = stripped.match(/\b([BMACPEF][0-9](?:\.[0-9])?)\b/i);
          const code = codeMatch ? codeMatch[1].toUpperCase() : "B1";
          const text = stripped.replace(/\b[BMACPEF][0-9](?:\.[0-9])?\b/gi,"").replace(/^[-•*]\s*/,"").trim();
          if(text.length > 2) points.push({code, text, nums: extractNums(text)});
        });

        const maxPts = maxMarks
          ? parseInt(maxMarks)
          : (totalMarks ? parseInt(totalMarks) : points.length || 1);

        if(points.length === 0) for(let i=0;i<maxPts;i++) points.push({code:"B1",text:`Mark point ${i+1}`,nums:[]});

        const kwPoints = points.map(pt=>{
          const ptWords = keywords(pt.text);
          const ptNums  = pt.nums || [];
          let awarded = false;

          const stemMatch = w => {
            const escaped = w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
            if(new RegExp('\\b'+escaped+'s?\\b','i').test(ans)) return true;
            const stem = w.replace(/(?:ses|ies|es|s)$/i,'');
            return stem.length>=3 && new RegExp('\\b'+stem.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'[a-z]{0,4}\\b','i').test(ans);
          };

          if(ptNums.length > 0){
                  const expectedAnswer = ptNums[ptNums.length - 1];
            awarded = extractNums(ans).some(n => Math.abs(n - expectedAnswer) < 0.01);
          } else if(pt.code==="M1" || pt.code==="P1"){
            const hasWorking = /[=÷×\/\*]|\b(divided|multiplied|times|plus|minus|equals|formula|method|substitut|calculat|workings?)\b/i.test(ans);
            if(ptWords.length > 0){
              const hits = ptWords.filter(w=>stemMatch(w)).length;
                awarded = (hits >= 1 && ans.length > 5) || (hasWorking && ans.length > 5);
            } else {
              awarded = hasWorking && ans.length > 5;
            }
          } else if(ptWords.length > 0){
            const hits = ptWords.filter(w=>stemMatch(w)).length;
            const _sw = [...ptWords].sort((a,b)=>b.length-a.length);
            const _mw = _sw.length > 3 ? _sw.slice(0,3) : _sw;
            const _h = _mw.filter(w=>stemMatch(w)).length;
            awarded = _mw.length<=2 ? _h>=1 : _h>=2;
          }
          return {...pt, awarded};
        });

        const allPoints = [...ruleResults, ...calcResults, ...kwPoints];
        const marksAvailable = Math.min(
          Math.max(points.length, ruleResults.length + calcResults.length),
          maxPts
        );
        const marksAwarded = Math.min(allPoints.filter(p=>p.awarded).length, marksAvailable);
        const percentage   = marksAvailable > 0 ? Math.round((marksAwarded / marksAvailable) * 100) : 0;
        const grade        = percentage>=(gradeBounds.A||70)?"A":percentage>=(gradeBounds.B||55)?"B":percentage>=(gradeBounds.C||40)?"C":percentage>=(gradeBounds.D||25)?"D":"F";

        const misconceptions = [];
        Object.values(errorsDB).flat().forEach(err=>{
          const errWords=keywords(err.error);
          if(errWords.length>0&&errWords.some(w=>ans.includes(w))&&!kwPoints.find(p=>p.text.toLowerCase().includes(errWords[0])&&p.awarded)){
            misconceptions.push(err.hint||err.error);
          }
        });

        const strengths    = allPoints.filter(p=>p.awarded).map(p=>p.text).slice(0,3);
        const improvements = allPoints.filter(p=>!p.awarded).map(p=>`Include: ${p.text}`).slice(0,3);
        return {marksAwarded,marksAvailable,percentage,grade,awardedPoints:allPoints,strengths,improvements,misconceptions};
      };

      const getAnswerText = () => {
        for(const msg of messages){
          if(typeof msg.content === "string") return msg.content;
          if(Array.isArray(msg.content)){
            const t = msg.content.find(b=>b.type==="text");
            if(t) return t.text;
          }
        }
        return "";
      };
      const answerText = getAnswerText();
      const scheme = globalScheme || "";

      if(isDetectQ) return JSON.stringify({questionId:"Q1",questionLabel:"Q1",confidence:"medium"});

      if(isOcr) return "Offline mode: image OCR unavailable without AI. Student answer text visible on paper — use text paste mode for offline marking.";

      if(isScheme){
        const qs = scheme.split(/\n(?=Q\d|Question\s*\d|\d+[\.\)])/i)
          .filter(s=>s.trim().length>5)
          .map((s,i)=>{
            const idMatch = s.match(/^(Q\d+[a-z]?|Question\s*\d+|\d+[\.\)])/i);
            const id    = idMatch ? idMatch[1].replace(/\s+/g,"").replace(/[.)]$/,"") : `Q${i+1}`;
            const label = id.startsWith("Q")||id.startsWith("q") ? id.toUpperCase() : `Q${i+1}`;
            const hints = s.split(/\n/).slice(1).map(l=>l.trim()).filter(l=>l.length>3).slice(0,4)
              .map((h,hi)=>({
                code: h.match(/\b([BMACPEF][0-9])\b/i)?.[1]?.toUpperCase()||"B1",
                text: h.replace(/\b[BMACPEF][0-9]\b/gi,"").replace(/^[-•*]\s*/,"").trim().slice(0,60),
                col:  hi%3===0?"#3dd68c":hi%3===1?"#f5c842":"#6c8ff5",
                left: "8%", top: `${12+hi*16}%`
              }));
            return {id:`q${i+1}`,label,hints};
          });
        if(qs.length===0) qs.push({id:"q1",label:"Q1",hints:[{code:"B1",text:"Mark scheme not parsed — add question headers (Q1, Q2…)",col:"#f5c842",left:"8%",top:"20%"}]});
        return JSON.stringify({questions:qs});
      }

      if(isExtract){
        const hasImage = messages.some(m=>Array.isArray(m.content)&&m.content.some(b=>b.type==="image"));
        const schemeQs = scheme.split(/\n(?=Q\d|Question\s*\d|\d+[\.\)])/i).filter(s=>s.trim().length>5).slice(0,6);
        const questions = schemeQs.map((s,i)=>{
          const idM = s.match(/^(Q\d+[a-z]?|Question\s*\d+|\d+[\.\)])/i);
          const id = idM ? `Q${i+1}` : `Q${i+1}`;
          return {id, description: s.split("\n")[0].replace(/^(Q\d+[a-z]?|Question\s*\d+|\d+[\.\)])\s*/i,"").trim().slice(0,60)||`Question ${i+1}`,
            studentAnswer:"", canRead: !hasImage, confidence: hasImage?"low":"medium",
            readingNote: hasImage?"Image OCR unavailable offline — type the student answer below":"Awaiting answer text"};
        });
        if(questions.length===0) questions.push({id:"Q1",description:"Question 1",studentAnswer:"",canRead:false,confidence:"low",readingNote:"No mark scheme questions found — add a scheme in Setup"});
        return JSON.stringify({studentName: studentName||"Student", questions});
      }

      if(isMarkWhole || isBatch){
        const hasImageMsg = messages.some(m=>Array.isArray(m.content)&&m.content.some(b=>b.type==="image"));
        const realAnswer  = answerText && (
          answerText.includes("STUDENT ANSWERS:") ||
          (answerText.trim().length>20 && answerText!=="Mark this paper.")
        );
        const cleanAnswer = answerText.includes("STUDENT ANSWERS:")
          ? answerText.split("STUDENT ANSWERS:")[1]?.trim() || answerText
          : answerText;

        if(hasImageMsg && !realAnswer){
          return JSON.stringify({
            _offlineNeedsText: true,
            totalScore:0, maxScore: totalMarks?parseInt(totalMarks):1,
            percentage:0, grade:"—",
            studentName: studentName||"Student",
            questions:[], overallFeedback:"",
            strengths:[], improvements:[],
            offlineMessage:"Offline mode cannot read handwriting from images. Please type or paste the student's answer to use keyword marking."
          });
        }

        const {marksAwarded,marksAvailable,percentage,grade,awardedPoints,strengths,improvements} = localMark(cleanAnswer||answerText, scheme, totalMarks?parseInt(totalMarks):null);
        return JSON.stringify({
          totalScore:marksAwarded, maxScore:marksAvailable, percentage, grade,
          studentName: studentName||"Student",
          questions: awardedPoints.slice(0,8).map((p,i)=>({
            id:`Q${i+1}`, description:p.text.slice(0,50)||`Mark point ${i+1}`,
            marksAwarded:p.awarded?1:0, marksAvailable:1,
            code:p.code, feedback:p.awarded?`✓ ${p.text}`:`✗ Not evidenced: ${p.text}`,
            correct:p.awarded, misconception:p.awarded?null:`Missing: ${p.text}`, uncertain:false
          })),
          overallFeedback: percentage>=70
            ?"Good performance. Most mark scheme criteria met."
            :percentage>=40
            ?"Partial marks awarded. Review the mark scheme criteria not evidenced."
            :"Answer does not sufficiently address the mark scheme criteria. Review the scheme and try again.",
          strengths: strengths.length>0 ? strengths : ["Attempt made"],
          improvements: improvements.length>0 ? improvements : ["Review mark scheme criteria"],
          annotations:[
            {region:"top-right",text:`${marksAwarded}/${marksAvailable}`,type:marksAwarded===marksAvailable?"correct":"comment"},
            {region:"top-left",text:"📋 Offline",type:"comment"},
          ]
        });
      }

      if(isQmMark){
        const qScheme = qmScheme||globalScheme||"";
        const {marksAwarded,marksAvailable,percentage,awardedPoints,strengths,improvements} = localMark(answerText, qScheme, 4);
        return JSON.stringify({
          marksAwarded, marksAvailable, percentage,
          breakdown: awardedPoints.slice(0,6).map(p=>({
            point:p.text||"Mark point", code:p.code,
            awarded:p.awarded,
            comment:p.awarded?`Evidenced in answer`:`Not found in answer — expected: ${p.text.slice(0,60)}`
          })),
          annotations:[
            {label:`${marksAwarded}/${marksAvailable}`,type:marksAwarded===marksAvailable?"correct":marksAwarded===0?"incorrect":"partial",placement:"top-right"},
          ],
          feedback:`${marksAwarded} out of ${marksAvailable} mark scheme criteria found in the answer. ${improvements.length>0?"Missing: "+improvements[0].replace("Include: ",""):""} ${percentage>=70?"Strong response.":"Review the mark scheme criteria not evidenced."}`,
          misconceptions:[],
          strengths: strengths.length>0?strengths:["Attempt made"],
          improvements: improvements.length>0?improvements:["Review mark scheme"]
        });
      }

      return JSON.stringify({response:"Offline mode.",totalScore:0,maxScore:0,percentage:0,grade:"N/A"});
    }

    const toOAI = (msgs, sys) => {
      const out = [];
      if (sys) out.push({ role:"system", content: sys });
      for (const m of msgs) {
        if (typeof m.content === "string") {
          out.push({ role: m.role, content: m.content });
        } else {
          const parts = m.content.map(block => {
            if (block.type === "text")   return { type:"text", text: block.text };
            if (block.type === "image") {
              const b64  = block.source?.data;
              const mime = block.source?.media_type || "image/jpeg";
              return { type:"image_url", image_url:{ url:`data:${mime};base64,${b64}` }};
            }
            if (block.type === "document") return { type:"text", text:"[PDF — requires cloud mode]" };
            return { type:"text", text:"" };
          });
          out.push({ role: m.role, content: parts });
        }
      }
      return out;
    };

    if (apiMode === "local") {
      const endpoint = localEndpoint.replace(/\/+$/,"");
      const res = await fetch(`${endpoint}/v1/chat/completions`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:localModel, messages:toOAI(messages,system), stream:false, max_tokens:maxTokens }),
      });
      if (!res.ok) { const t=await res.text().catch(()=>""); throw new Error(`Local error ${res.status}${t?" — "+t.slice(0,120):""}`); }
      const d = await res.json();
      return d.choices?.[0]?.message?.content || "";

    } else if (apiMode === "proxy") {
      if (!proxyUrl.trim()) throw new Error("Proxy URL not set — add it in Privacy & Data.");
      const base = proxyUrl.trim().replace(/\/+$/,"");
      const res = await fetch(`${base}/v1/messages`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, system, messages }),
      });
      if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e?.error||`Proxy error ${res.status}`); }
      const d = await res.json();
      return d.content.find(c=>c.type==="text")?.text || "";

    } else if (apiMode === "gemini") {
      if (!geminiKey.trim()) throw new Error("Gemini API key not set — add it in Privacy & Data.");
      const model = "gemini-1.5-flash";
      const url   = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${geminiKey.trim()}`;

      const contents = [];
      const allParts = [];
      if (system) allParts.push({ text: `INSTRUCTIONS:\n${system}\n\n` });

      for (const m of messages) {
        const role = m.role === "assistant" ? "model" : "user";
        if (typeof m.content === "string") {
          contents.push({ role, parts:[{ text: m.content }] });
        } else {
          const parts = m.content.map(block => {
            if (block.type === "text")  return { text: block.text };
            if (block.type === "image") return { inlineData:{ mimeType: block.source?.media_type||"image/jpeg", data: block.source?.data||"" }};
            if (block.type === "document") {
              return { inlineData:{ mimeType:"application/pdf", data: block.source?.data||"" }};
            }
            return { text:"" };
          });
          if (allParts.length && role === "user") {
            contents.push({ role:"user", parts:[...allParts, ...parts] });
            allParts.length = 0;
          } else {
            contents.push({ role, parts });
          }
          continue;
        }
        if (allParts.length && role === "user") {
          contents[contents.length-1].parts = [...allParts, ...contents[contents.length-1].parts||[]];
          allParts.length = 0;
        }
      }

      const res = await fetch(url, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          contents,
          generationConfig:{ maxOutputTokens: maxTokens, temperature: 0.2 },
        }),
      });
      if (!res.ok) {
        const e = await res.json().catch(()=>({}));
        throw new Error(e?.error?.message || `Gemini error ${res.status}`);
      }

    mc.width = W; mc.height = H;
    const ctx = mc.getContext("2d");
    ctx.drawImage(video, 0, 0, W, H);
    const curr = ctx.getImageData(0, 0, W, H).data;
    if (!prevFrameRef.current) { prevFrameRef.current = curr; return 999; }
    const prev = prevFrameRef.current;
    let diff = 0;
    for (let i = 0; i < curr.length; i += 16) diff += Math.abs(curr[i] - prev[i]);
    prevFrameRef.current = curr;
    return diff / (curr.length / 16);
  }, []);

  /* ── Edge/document boundary detection — runs on rAF while camera active ── */
  const runEdgeDetection = useCallback(()=>{
    const video=videoRef.current;
    const canvas=edgeCanvasRef.current;
    if(!video||!canvas||video.readyState<2){ edgeRafRef.current=requestAnimationFrame(runEdgeDetection); return; }
    const W=video.videoWidth||1280, H=video.videoHeight||720;
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext("2d");
    ctx.clearRect(0,0,W,H);
    const S=0.1, sw=Math.round(W*S), sh=Math.round(H*S);
    const tmp=document.createElement("canvas"); tmp.width=sw; tmp.height=sh;
    const tc=tmp.getContext("2d");

    const pix=tc.getImageData(0,0,sw,sh).data;
    let minX=sw,minY=sh,maxX=0,maxY=0,count=0;
    for(let y=1;y<sh-1;y++){
      for(let x=1;x<sw-1;x++){
        const i=(y*sw+x)*4;
        const bright=(pix[i]+pix[i+1]+pix[i+2])/3;
        const neighbors=[(y*sw+(x-1))*4,(y*sw+(x+1))*4,((y-1)*sw+x)*4,((y+1)*sw+x)*4];
        let edgeStr=0;
        neighbors.forEach(ni=>{ edgeStr+=Math.abs(bright-(pix[ni]+pix[ni+1]+pix[ni+2])/3); });

          if(fy<minY)minY=fy; if(fy>maxY)maxY=fy;
          count++;
        }
      }
    }
    if(count>20&&(maxX-minX)>W*0.15&&(maxY-minY)>H*0.15){
      const pad=8;
      const bx=Math.max(0,minX-pad), by=Math.max(0,minY-pad);
      const bw=Math.min(W,maxX+pad)-bx, bh=Math.min(H,maxY+pad)-by;
      const coverage=(bw*bh)/(W*H);
      const col=coverage>0.55?"#3dd68c":coverage>0.28?"#f5c842":"#e8473f";
      const lw=3;
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(bx,by,bw,bh,8):ctx.rect(bx,by,bw,bh);
      ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.stroke();
      const cs=28;
      [[bx,by,1,1],[bx+bw,by,-1,1],[bx,by+bh,1,-1],[bx+bw,by+bh,-1,-1]].forEach(([cx,cy,dx,dy])=>{

      ctx.fillText(`📄 ${Math.round(coverage*100)}%`,bx+6,by-9);
    }

  },[]);

        url=`https://api.bing.microsoft.com/v7.0/search?q=${encodeURIComponent(query)}&count=5&mkt=en-GB`;
      }
      const headers=webSearchEngine==="bing"?{"Ocp-Apim-Subscription-Key":webSearchKey}:{};
      const res=await fetch(url,{headers});
      if(!res.ok) return null;
      const data=await res.json();
      const items=webSearchEngine==="google"
        ?data.items||[]
        :(data.webPages?.value||[]);
      return items.slice(0,4).map(it=>({
        title: it.title||"",
        snippet: webSearchEngine==="google"?(it.snippet||""):(it.snippet||""),
        url: it.link||it.url||""
      }));
    }catch(e){ return null; }
    finally{ setWebSearching(false); }
  },[webSearchEnabled,webSearchKey,webSearchCx,webSearchEngine]);
  const captureFrame=useCallback(()=>{const v=videoRef.current,c=canvasRef.current;if(!v||!c)return null;c.width=v.videoWidth||1280;c.height=v.videoHeight||720;c.getContext("2d").drawImage(v,0,0);return c.toDataURL("image/jpeg",0.92);},[]);

  /* ══════════════════════════════════════════════════════════════════════
     ENHANCED LOCAL OCR SYSTEM
     • tessdata_fast LSTM model (loads ~3x faster, good for print/neat handwriting)
     • IndexedDB cache — downloads once, works fully offline forever
     • Custom .traineddata upload from local folder
     • Advanced preprocessing: upscale → deskew → Otsu binarisation
     • Multi-pass OCR (PSM 1 + PSM 6), takes better result
  ══════════════════════════════════════════════════════════════════════ */

  const idbGet = useCallback((key) => new Promise((res, rej) => {
    const req = indexedDB.open("nv_ocr_cache", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("data");
    req.onsuccess = e => {
      const tx = e.target.result.transaction("data", "readonly");
      const r  = tx.objectStore("data").get(key);
      r.onsuccess = () => res(r.result);
      r.onerror   = () => res(null);
    };
    req.onerror = () => res(null);
  }), []);

  const idbSet = useCallback((key, value) => new Promise((res) => {
    const req = indexedDB.open("nv_ocr_cache", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("data");
    req.onsuccess = e => {
      const tx = e.target.result.transaction("data", "readwrite");
      tx.objectStore("data").put(value, key);
      tx.oncomplete = () => res(true);
      tx.onerror    = () => res(false);
    };
    req.onerror = () => res(false);
  }), []);

  const idbHas = useCallback(async (key) => {
    const v = await idbGet(key);
    return v != null;
  }, [idbGet]);

  const fetchTrainedData = useCallback(async (modelName, onProgress) => {
    const cacheKey = `traineddata_${modelName}`;
    const cached = await idbGet(cacheKey);
    if (cached) {
      onProgress && onProgress(100, "Loaded from local cache");
      return cached; // ArrayBuffer
    }
    const url = `https://github.com/tesseract-ocr/tessdata_fast/raw/main/${modelName}.traineddata`;
    onProgress && onProgress(5, `Downloading ${modelName} model…`);
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`Failed to fetch model: ${resp.status}`);
    const total = parseInt(resp.headers.get("Content-Length") || "0");
    const reader = resp.body.getReader();
    const chunks = [];
    let received = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      if (total > 0) onProgress && onProgress(Math.round((received/total)*80)+5, "Downloading…");
    }
    const buf = new Uint8Array(received);
    let pos = 0;
    for (const chunk of chunks) { buf.set(chunk, pos); pos += chunk.length; }
    onProgress && onProgress(90, "Caching locally…");
    await idbSet(cacheKey, buf.buffer);
    onProgress && onProgress(100, "Ready");
    return buf.buffer;
  }, [idbGet, idbSet]);

  const getTesseractWorker = useCallback(async () => {
    if (tesseractWorkerRef.current) return tesseractWorkerRef.current;
    if (typeof Tesseract === "undefined") throw new Error("Tesseract.js not loaded.");
    setTesseractLoading(true);
    setOcrProgress(0);
    try {
      const customKey = "traineddata_custom";
      const bestKey   = "traineddata_eng_best";
      const hasCustom = await idbHas(customKey);
      const hasBest   = await idbHas(bestKey);

      let langData = null;
      let modelLabel = "eng";

      if (hasCustom) {
        langData   = await idbGet(customKey);
        modelLabel = "custom";
        setMarkingStep("Loading custom OCR model from local cache…");
        setOcrLoadStep("Loading custom model…"); setOcrProgress(20);
      } else if (hasBest) {
        langData   = await idbGet(bestKey);
        modelLabel = "eng_best";
        setMarkingStep("Loading high-accuracy OCR model from cache…");
        setOcrLoadStep("Loading from cache…"); setOcrProgress(20);
      } else {
        setMarkingStep("Downloading OCR model (~4MB, once only)…");
        setOcrLoadStep("Downloading model…"); setOcrProgress(2);
        try {
          langData = await fetchTrainedData("eng_fast", (pct, msg) => {
            setOcrProgress(pct);
            setOcrLoadStep(msg || "Downloading…");
            setMarkingStep(msg || "Downloading OCR model…");
          });
          await idbSet(bestKey, langData);
          modelLabel = "eng_fast";
          setOcrLoadStep("Cached locally ✓"); setOcrProgress(85);
        } catch (dlErr) {
          setMarkingStep("Using standard OCR model…");
          setOcrLoadStep("Using standard model…"); setOcrProgress(20);
        }
      }

      const workerOpts = {
        logger: m => {
          if (m.status === "recognizing text")      { setOcrProgress(Math.round(m.progress * 100)); setOcrLoadStep("Recognising text…"); }
          if (m.status === "loading tesseract core") { setOcrProgress(10); setOcrLoadStep("Loading OCR core…"); }
          if (m.status === "initializing tesseract") { setOcrProgress(25); setOcrLoadStep("Initialising engine…"); }
          if (m.status === "loading language traineddata") { setOcrProgress(40); setOcrLoadStep("Loading language model…"); }
          if (m.status === "initializing api")       { setOcrProgress(55); setOcrLoadStep("Initialising API…"); }
        },
        workerPath: "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js",
        corePath:   "https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core.wasm.js",
        langPath:   "https://tessdata.projectnaptha.com/4.0.0",
      };

      let worker;
      if (langData) {
        worker = await Tesseract.createWorker(modelLabel, 1, workerOpts);
        await worker.loadLanguage(modelLabel, langData);
        await worker.initialize(modelLabel);
      } else {
        worker = await Tesseract.createWorker("eng", 1, workerOpts);
      }

      await worker.setParameters({
        tessedit_pageseg_mode:      "1",   // Auto page seg + OSD
        preserve_interword_spaces:  "1",
        tessedit_do_invert:         "0",   // We handle inversion ourselves
        textord_heavy_nr:           "1",   // Noise removal
        edges_max_children_per_outline: "40",
      });

      tesseractWorkerRef.current = worker;
      setTesseractReady(true);
      setMarkingStep("");
      setOcrLoadStep("");
      setOcrProgress(0);
      return worker;
    } finally {
      setTesseractLoading(false);
    }
  }, [idbGet, idbHas, idbSet, fetchTrainedData]);

  const preprocessForOCR = useCallback((imageB64) => {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const MIN_DIM = 1400, MAX_DIM = 2800;
        let scale = img.width < MIN_DIM ? MIN_DIM / img.width : 1;
        if (img.width * scale > MAX_DIM) scale = MAX_DIM / img.width;
        const W = Math.round(img.width  * scale);
        const H = Math.round(img.height * scale);

        const c = document.createElement("canvas");
        c.width = W; c.height = H;
        const ctx = c.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.filter = "contrast(1.35) brightness(1.05)";
        ctx.drawImage(img, 0, 0, W, H);
        ctx.filter = "none";  // reset filter
        const d = ctx.getImageData(0, 0, W, H);

        const grey = new Uint8Array(W * H);
        for (let i = 0, j = 0; i < d.data.length; i += 4, j++) {
          grey[j] = Math.round(0.299*d.data[i] + 0.587*d.data[i+1] + 0.114*d.data[i+2]);
        }

        const TILE = 64;
        const normed = new Uint8Array(W * H);
        for (let ty = 0; ty < H; ty += TILE) {
          for (let tx = 0; tx < W; tx += TILE) {
            const tw = Math.min(TILE, W - tx), th = Math.min(TILE, H - ty);
            let mn = 255, mx = 0;
            for (let y = ty; y < ty+th; y++)
              for (let x = tx; x < tx+tw; x++) { const v=grey[y*W+x]; if(v<mn)mn=v; if(v>mx)mx=v; }
            const range = mx - mn || 1;
            for (let y = ty; y < ty+th; y++)
              for (let x = tx; x < tx+tw; x++) {
                const idx=y*W+x;
                normed[idx]=Math.round(((grey[idx]-mn)/range)*255);
              }
          }
        }

        const hist = new Array(256).fill(0);
        for (let i = 0; i < normed.length; i++) hist[normed[i]]++;
        const total = normed.length;
        let sum = 0; for (let i = 0; i < 256; i++) sum += i * hist[i];
        let sumB = 0, wB = 0, wF = 0, maxVar = 0, threshold = 128;
        for (let t = 0; t < 256; t++) {
          wB += hist[t]; if (!wB) continue;
          wF = total - wB; if (!wF) break;
          sumB += t * hist[t];
          const mB = sumB / wB, mF = (sum - sumB) / wF;
          const variance = wB * wF * (mB - mF) * (mB - mF);
          if (variance > maxVar) { maxVar = variance; threshold = t; }
        }

        for (let i = 0, j = 0; i < d.data.length; i += 4, j++) {
          const v = normed[j] <= threshold ? 0 : 255;
          d.data[i] = d.data[i+1] = d.data[i+2] = v;
          d.data[i+3] = 255;
        }
        ctx.putImageData(d, 0, 0);

        let bestAngle = 0;
        let bestVar   = -1;
        const angles  = [-2, -1, 0, 1, 2];
        for (const angle of angles) {
          const rad = angle * Math.PI / 180;
          const tc = document.createElement("canvas"); tc.width=W; tc.height=H;
          const tx = tc.getContext("2d");
          tx.fillStyle="#fff"; tx.fillRect(0,0,W,H);
          tx.translate(W/2, H/2); tx.rotate(rad); tx.translate(-W/2,-H/2);
          tx.drawImage(c, 0, 0);
          const td = tx.getImageData(0,0,W,H);
          const rowMeans = [];
          for (let y=0;y<H;y++){
            let s=0; for(let x=0;x<W;x++) s+=td.data[(y*W+x)*4];
            rowMeans.push(s/W);
          }
          const mean = rowMeans.reduce((a,b)=>a+b,0)/rowMeans.length;
          const variance = rowMeans.reduce((s,v)=>s+(v-mean)*(v-mean),0)/rowMeans.length;
          if (variance > bestVar) { bestVar=variance; bestAngle=angle; }
        }

        const fc = document.createElement("canvas"); fc.width=W; fc.height=H;
        const fx = fc.getContext("2d");
        fx.fillStyle="#fff"; fx.fillRect(0,0,W,H);
        fx.translate(W/2,H/2); fx.rotate(bestAngle*Math.PI/180); fx.translate(-W/2,-H/2);
        fx.drawImage(c,0,0);

        resolve(fc.toDataURL("image/png"));
      };
      img.src = imageB64;
    });
  }, []);

  const runTesseractOCR = useCallback(async (imageB64, returnConfidence=false, subjectHint="") => {
    const worker = await getTesseractWorker();
    setOcrProgress(0);
    setOcrLoadStep("Reading handwriting…");

    const mathLike = /math|maths|physics|chemistry|numeracy/i.test(subjectHint||subject||"");
    const ocrParams = { tessedit_pageseg_mode: "6" };
    if (mathLike) {
      ocrParams.tessedit_char_whitelist = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz+-*/=()[].,% ";
    }
    await worker.setParameters(ocrParams);
    const r1 = await worker.recognize(imageB64);
    const t1  = (r1.data.text || "").trim();
    setOcrProgress(70);

    let bestResult = r1;
    let result = t1;
    if (t1.length < 15) {
      setOcrLoadStep("Trying full-page mode…");
      await worker.setParameters({ tessedit_pageseg_mode: "1" });
      const r2 = await worker.recognize(imageB64);
      const t2  = (r2.data.text || "").trim();
      if (t2.length > t1.length) { bestResult = r2; result = t2; }
    }
    setOcrProgress(100);
    setOcrLoadStep("Done");

    const cleaned = result
      .replace(/[|]{2,}/g, "")
      .replace(/\f/g, "\n")
      .replace(/[ \t]{3,}/g, "  ")
      .replace(/\n{3,}/g, "\n\n")
      .trim();

    if (!returnConfidence) return cleaned;

    const CONF_THRESHOLD = 70;  // Raise to 70% — flag below this for Manual Review
    const words = (bestResult.data.words || []).map(w => ({
      text: w.text,
      conf: w.confidence,
      low:  w.confidence < CONF_THRESHOLD && w.text.trim().length > 1,
    }));
    const avgConf = words.length
      ? Math.round(words.reduce((s,w)=>s+w.conf,0)/words.length) : 100;
    const lowConfWords = words.filter(w=>w.low).map(w=>w.text);

    return { text: cleaned, words, avgConf, lowConfWords,
             hasLowConf: lowConfWords.length > 0,
             needsManualReview: avgConf < CONF_THRESHOLD || lowConfWords.length > 3 };
  }, [getTesseractWorker]);

  /* ── Pre-warm OCR worker silently when offline mode is enabled ─────── */
  useEffect(() => {
    if (!offlineMode || tesseractReady || tesseractLoading) return;
    let cancelled = false;
    const prewarm = async () => {
      await new Promise(r => setTimeout(r, 800)); // small delay so UI settles
      if (cancelled) return;
      try { await getTesseractWorker(); } catch(e) { /* silent — will retry on first use */ }
    };
    prewarm();
    return () => { cancelled = true; };
  }, [offlineMode, tesseractReady, tesseractLoading, getTesseractWorker]);
  const loadCustomTrainedData = useCallback(async (file) => {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          await idbSet("traineddata_custom", e.target.result);
          if (tesseractWorkerRef.current) {
            await tesseractWorkerRef.current.terminate();
            tesseractWorkerRef.current = null;
            setTesseractReady(false);
          }
          resolve(true);
        } catch(err) { reject(err); }
      };
      reader.onerror = () => reject(new Error("Failed to read file"));
      reader.readAsArrayBuffer(file);
    });
  }, [idbSet]);

  const clearOcrCache = useCallback(async () => {
    await new Promise(res => {
      const req = indexedDB.open("nv_ocr_cache", 1);
      req.onsuccess = e => {
        const tx = e.target.result.transaction("data","readwrite");
        tx.objectStore("data").clear();
        tx.oncomplete = () => res();
      };
      req.onerror = () => res();
    });
    if (tesseractWorkerRef.current) {
      await tesseractWorkerRef.current.terminate();
      tesseractWorkerRef.current = null;
    }
    setTesseractReady(false);
  }, []);

  /* ══════════════════════════════════════════════════════════════════════
     TOPIC EXTRACTOR — parse uploaded text/scheme into structured topic table
     Detects codes like: 1A), 1b), Q1a, 2.1, Topic 3 — Part A, Chapter 5.2
     Works fully offline, no AI needed.
  ══════════════════════════════════════════════════════════════════════ */
  /* ── AI-powered topic extraction ────────────────────────────────────── */
  const extractTopicsWithAI = useCallback(async (rawText) => {
    const sys = `You are a curriculum expert. Extract every topic, question, or learning objective from the provided text.
Return ONLY valid JSON — no preamble, no markdown:
{"topics":[{"code":"1A","topic":"Solving two-step equations","section":"Algebra","marks":""},...]}

Rules:
- Preserve original codes exactly (1A, 1B, Q3a, 2.1, T4 etc.)
- If no code exists, generate a sensible one (T1, T2...)
- "section" = the heading/unit this topic belongs to (or "")
- "marks" = mark value if stated (or "")
- Include ALL topics — do not summarise or skip any
- Topic descriptions should be concise but complete`;

    const text = await callAPI(
      [{role:"user", content:`Extract all topics from this document:\n\n${rawText.slice(0,12000)}`}],
      sys, 2000
    );
    const parsed = parseJSON(text);
    const rows = (parsed.topics||[]).map((t,i)=>({
      id: Date.now()+i,
      code: t.code||`T${i+1}`,
      topic: t.topic||"",
      section: t.section||"",
      subject: topicSubject||subject||"",
      year: topicYear,
      marks: t.marks||"",
    }));
    return rows;
  }, [callAPI, topicSubject, topicYear, subject]);

  /* ── Process uploaded files for topic extraction ─────────────────────
     Handles: PDF (render→OCR), DOCX (mammoth), TXT/CSV (plain text), images (OCR)
  ──────────────────────────────────────────────────────────────────────── */
  const processTopicFiles = useCallback(async (files) => {
    let combined = "";
    setTopicOcrBusy(true); setTopicOcrProgress(0);
    const total = files.length;
    try {
    for (let fi = 0; fi < files.length; fi++) {
      const file = files[fi];
      setTopicOcrFile(file.name);
      setTopicOcrProgress(Math.round((fi/total)*100));

      try {
        const ext = file.name.split(".").pop().toLowerCase();

        if (ext === "docx" || ext === "doc") {
          if (typeof mammoth !== "undefined") {
            const ab = await file.arrayBuffer();
            const res = await mammoth.extractRawText({arrayBuffer:ab});
            combined += `\n\n=== ${file.name} ===\n${res.value}`;
          }
        } else if (ext === "pdf") {
          if (typeof pdfjsLib !== "undefined") {
            const ab = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data:ab}).promise;
            let pdfText = "";
            for (let p = 1; p <= Math.min(pdf.numPages, 20) /* large PDFs: first 20 pages only — split before uploading for best results */; p++) {
              const page = await pdf.getPage(p);
              try {
                const tc = await page.getTextContent();
                const pageText = tc.items.map(i=>i.str).join(" ").trim();
                if (pageText.length > 30) { pdfText += pageText + "\n"; continue; }
              } catch {}
              const vp = page.getViewport({scale:2.0});
              const canvas = document.createElement("canvas");
              canvas.width = vp.width; canvas.height = vp.height;
              await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
              const b64 = canvas.toDataURL("image/png");
              const preprocessed = await preprocessForOCR(b64);
              setTopicOcrProgress(Math.round(((fi + p/pdf.numPages)/total)*100));
              const ocrResult = await runTesseractOCR(preprocessed, true, subject);
          const ocrText = typeof ocrResult === "string" ? ocrResult : ocrResult.text;
          if (typeof ocrResult === "object" && ocrResult.hasLowConf) {
            setOcrConfidence({
            avgConf: ocrResult.avgConf,
            lowConfWords: ocrResult.lowConfWords,
            needsReview: ocrResult.needsManualReview,
          });
          if (ocrResult.needsManualReview) {
            setMarkingStep("⚠ Low OCR confidence — please verify handwriting reading");
          }
          } else {
            setOcrConfidence(null);
          }
              pdfText += ocrText + "\n";
            }
            if (pdf.numPages > 20) {
              combined += `\n\n=== ${file.name} === [Large PDF: showing pages 1-20 of ${pdf.numPages} — split the file for complete extraction]\n${pdfText}`;
            } else {
              combined += `\n\n=== ${file.name} ===\n${pdfText}`;
            }
          }
        } else if (["jpg","jpeg","png","webp","bmp","gif"].includes(ext)) {
          const b64 = await new Promise(res=>{
            const r = new FileReader();
            r.onload = e => res(e.target.result);
            r.readAsDataURL(file);
          });
          const preprocessed = await preprocessForOCR(b64);
          const ocrText = await runTesseractOCR(preprocessed, false, topicSubject||subject||"");
          combined += `\n\n=== ${file.name} ===\n${ocrText}`;
        } else {
          const text = await file.text();
          combined += `\n\n=== ${file.name} ===\n${text}`;
        }
      } catch (e) {
        combined += `\n\n=== ${file.name} === [Error: ${e.message}]`;
      }
    }

    } finally {
      setTopicOcrBusy(false); setTopicOcrProgress(100); setTopicOcrFile("");
    }
    return combined.trim();
  }, [preprocessForOCR, runTesseractOCR]);

  const extractTopics = useCallback((rawText) => {
    const lines = (rawText||"").split(/\n/).map(l=>l.trim()).filter(Boolean);
    const rows = [];
    let seqNum = 1;

    const patterns = [
      { re: /^(\d+)\s*([A-Za-z])\s*[\)\.:\-]\s*(.+)$/,    code: (m)=>`${m[1]}${m[2].toUpperCase()}` },
      { re: /^Q(\d+)\s*([A-Za-z])\s*[\)\.:\-]\s*(.+)$/i,  code: (m)=>`Q${m[1]}${m[2].toUpperCase()}` },
      { re: /^(\d+)\.(\d+)\s*[\)\.:\-]?\s*(.+)$/,          code: (m)=>`${m[1]}.${m[2]}` },
      { re: /^(\d+)\s*[\)\.:\-]\s*(.+)$/,                   code: (m,t)=>`${m[1]}`, topic: (m)=>m[2] },
      { re: /^(?:topic|chapter|unit|section|part)\s*(\d+[A-Za-z]?)[:\-\s]+(.+)$/i, code: (m)=>`T${m[1].toUpperCase()}`, topic:(m)=>m[2] },
      { re: /^[BMACPEFbmacpef][0-9]\s+(.{8,})$/,            code: (m,_,i)=>`MK${i+1}`, topic:(m)=>m[1] },
    ];

    let currentSection = "";

    lines.forEach((line, idx) => {
      if (line.length < 4) return;

      const wordCount = line.split(/\s+/).length;
      const isHeader = wordCount <= 6 &&
        !line.match(/\)$/) &&
        (line === line.toUpperCase() || /^[A-Z][a-z]+ [A-Z]/.test(line)) &&
        !line.match(/^\d/);
      if (isHeader && wordCount >= 2) {
        currentSection = line.replace(/[:\-]+$/, "").trim();
        return;
      }

      for (const p of patterns) {
        const m = line.match(p.re);
        if (m) {
          const code = p.code(m, line, rows.length);
          const topicText = p.topic ? p.topic(m) : (m[3]||m[2]||"").trim();
          const clean = topicText
            .replace(/\b[BMACPEF][0-9]\b/gi,"")
            .replace(/\(\d+\s*marks?\)/gi,"")
            .replace(/\[\d+\]/g,"")
            .trim();
          if (clean.length < 3) return;
          rows.push({
            id: seqNum++,
            code,
            topic: clean,
            section: currentSection,
            subject: topicSubject || subject || "",
            year: topicYear,
            marks: (line.match(/\b(\d+)\s*marks?\b/i)||[])[1] || "",
          });
          return; // matched — don't try other patterns
        }
      }

      if (line.length > 15 && /^[A-Z]/.test(line) && !line.includes("{") && !line.includes("<")) {
        rows.push({
          id: seqNum++,
          code: `T${seqNum-1}`,
          topic: line.replace(/\b[BMACPEF][0-9]\b/gi,"").replace(/\(\d+\s*marks?\)/gi,"").trim(),
          section: currentSection,
          subject: topicSubject || subject || "",
          year: topicYear,
          marks: (line.match(/\b(\d+)\s*marks?\b/i)||[])[1] || "",
        });
      }
    });

    return rows;
  }, [topicSubject, topicYear, subject]);

  /* ── Export topic rows to Excel CSV ─────────────────────────────────── */
  const exportTopicsToCSV = useCallback(() => {
    if (!topicRows.length) return;
    const header = ["Code","Topic","Section","Subject","Year Group","Marks"];
    const csvRows = [
      header.join(","),

        `"${r.topic.replace(/"/g,'""')}"`,

        `"${r.subject}"`,
        `"${r.year}"`,
        `"${r.marks}"`,
      ].join(","))
    ];
    const blob = new Blob([csvRows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${topicSubject||"topics"}_${new Date().toLocaleDateString("en-GB").replace(/\//g,"-")}.csv`;
    a.click();
  }, [topicRows, topicSubject]);

  /* ── Export topic rows to Excel XLSX ────────────────────────────────── */
  const exportTopicsToXLSX = useCallback(() => {
    if (!topicRows.length || typeof XLSX === "undefined") return;
    const ws = XLSX.utils.json_to_sheet(topicRows.map(r=>({
      "Code": r.code,
