    XLSX.writeFile(wb, `${topicSubject||"topics"}_${new Date().toLocaleDateString("en-GB").replace(/\//g,"-")}.xlsx`);
  }, [topicRows, topicSubject]);

  /* ── markWhole — full AI marking of an image ── */
  const markWhole=useCallback(async (img, extraAnswers)=>{
    setMarking(true);setMarkingStep("Preparing paper for marking…");
    try{
      if(!offlineMode && !apiReady){
        setMarkingStep("No API key — using local mark scheme matching…");
        await new Promise(r=>setTimeout(r,600));
        const combinedAnswer = extraAnswers
          ? Object.values(extraAnswers).join(" ")
          : "";
        const scheme_ = globalScheme||"";
        const lines = scheme_.split(/\n/).map(l=>l.trim()).filter(Boolean);
        const stopWords = new Set(["the","a","an","and","or","of","to","in","is","are","was","were","it","its","for","on","at","by","as","with","from","that","this","be","been","being","have","has","had","do","does","did","will","would","can","could","should","not","no","all","any","each","per","use","used","show","shown","give","given","required","needed","through","using","energy","correct","named","examples","least"]);
        const kws = w=>w.toLowerCase().match(/\b[a-z]{4,}\b/g)?.filter(w=>!stopWords.has(w))||[];
        const extractNums = s=>(s.match(/-?[\d]+(?:\.\d+)?/g)||[]).map(Number);
        const stemMatch = (w,text)=>{
          const e=w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
          if(new RegExp('\\b'+e+'s?\\b','i').test(text)) return true;
          const stem=w.replace(/(?:ses|ies|es|s)$/i,'');
          return stem.length>=3&&new RegExp('\\b'+stem.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'[a-z]{0,4}\\b','i').test(text);
        };
        const points=[];
        lines.forEach(line=>{
          const stripped=line.replace(/^Q(?:n|uestion)?\s*\d+[a-z]?[\s\)\.:\-]*/i,"").replace(/^\d+[a-z]?[\.\)\s]+/,"").replace(/^[a-z][\)\.]\s*/i,"").replace(/^\([a-z]\)\s*/i,"").trim();
          if(!stripped||stripped.length<3) return;
          const codeM=stripped.match(/\b([BMACPEF][0-9])\b/i);
          const code=codeM?codeM[1].toUpperCase():"B1";
          const text=stripped.replace(/\b[BMACPEF][0-9]\b/gi,"").replace(/^[-•*—]\s*/,"").trim();
          if(text.length>2) points.push({code,text,nums:extractNums(text)});
        });
        const maxPts=totalMarks?parseInt(totalMarks):points.length||1;
        if(points.length===0) for(let i=0;i<maxPts;i++) points.push({code:"B1",text:`Mark point ${i+1}`,nums:[]});
        const ansLower=combinedAnswer.toLowerCase();
        const marked=points.map(pt=>{
          const ptWords=kws(pt.text),ptNums=pt.nums||[];
          let awarded=false;
          if(ptNums.length>0){const exp=ptNums[ptNums.length-1];awarded=extractNums(ansLower).some(n=>Math.abs(n-exp)<0.01);}
          if(!awarded&&ptWords.length>0){const hits=ptWords.filter(w=>stemMatch(w,ansLower)).length;// Cap at 3 keywords for long mark points
            var sw=ptWords.slice().sort(function(a,b){return b.length-a.length;});
            var mw=sw.length>3?sw.slice(0,3):sw;
            var mh=mw.filter(function(w){return stemM(w,a);}).length;
            awarded=mw.length<=2?mh>=1:mh>=2;}
          return{...pt,awarded};
        });
        const avail=Math.min(points.length,maxPts);
        const awarded=Math.min(marked.filter(p=>p.awarded).length,avail);
        const pct=avail>0?Math.round((awarded/avail)*100):0;
        const gb={A:70,B:55,C:40,D:25};
        const grade=pct>=gb.A?"A":pct>=gb.B?"B":pct>=gb.C?"C":pct>=gb.D?"D":"F";
        const imageOnly = !combinedAnswer && img;
        const fallbackResult = imageOnly ? {
          totalScore:0,maxScore:avail,percentage:0,grade:"—",
          studentName:studentName||"Student",
          questions:points.map((p,i)=>({id:`Q${i+1}`,description:p.text,marksAwarded:0,marksAvailable:1,code:p.code,feedback:"Could not read answer — no API key set. Type the answer in Manual Assist or add an API key.",correct:false,misconception:null,uncertain:true})),
          overallFeedback:"No API key set. Switch to Offline Mode to use keyword marking, or add a Claude API key in Privacy & Data to use AI marking.",
          strengths:[],improvements:["Add an API key in Privacy & Data → Claude API","Or enable Offline Mode in the sidebar to use local marking"],
          _fallback:true, _noKey:true, image:img
        } : {
          totalScore:awarded,maxScore:avail,percentage:pct,grade,
          studentName:studentName||"Student",
          questions:marked.map((p,i)=>({id:`Q${i+1}`,description:p.text,marksAwarded:p.awarded?1:0,marksAvailable:1,code:p.code,
            feedback:p.awarded?`✓ ${p.text}`:`✗ Not found in answer. Expected: ${p.text}`,
            correct:p.awarded,misconception:p.awarded?null:`Missing: ${p.text}`,uncertain:false})),
          overallFeedback:pct>=70?"Good performance based on keyword matching.":"Answer does not fully address the mark scheme criteria.",
          strengths:marked.filter(p=>p.awarded).map(p=>p.text).slice(0,3),
          improvements:marked.filter(p=>!p.awarded).map(p=>`Include: ${p.text}`).slice(0,3),
          _fallback:true, image:img
        };
        setResults(fallbackResult);
        setReviewMode(null);setUncertainQs([]);setManualAnswers({});
        setTab("results");
        return;
      }

      const b64=img.split(",")[1];
      const answerNote = extraAnswers && Object.keys(extraAnswers).length>0
        ? `\n\nTEACHER-SUPPLIED ANSWERS FOR UNCLEAR QUESTIONS:\n${Object.entries(extraAnswers).map(([id,ans])=>`${id}: ${ans}`).join("\n")}\nUse these answers when marking those questions — do not try to re-read them from the image.`
        : "";
      let searchNote="";
      if(webSearchEnabled&&webSearchKey&&globalScheme){
        setMarkingStep("Searching web for context…");
        const query=`${subject||""} exam mark scheme answers ${globalScheme.split("\n")[0].slice(0,80)}`;
        const hits=await searchWeb(query);
        if(hits&&hits.length>0){
          searchNote=`\n\nWEB REFERENCE (use only to supplement mark scheme — do not override it):\n${hits.map(h=>`• ${h.title}: ${h.snippet}`).join("\n")}`;
        }
        setMarkingStep("Reading student work…"); await new Promise(r=>setTimeout(r,250)); setMarkingStep("Sending to AI marker…");
      }
      const sys=`You are an expert examiner marking a student paper.\nSubject: ${subject||"General"}${totalMarks?`\nMax marks: ${totalMarks}`:""}${studentName?`\nStudent: ${studentName}`:""}\nMARKING SCHEME: ${globalScheme||"Apply standard academic marking."}\n${globalMisconceptions?`MISCONCEPTIONS TO FLAG: ${globalMisconceptions}`:""}\n${answerNote}${searchNote}\nFor each question use B/M/A mark codes matching the marking scheme.\nRespond ONLY with valid JSON, no markdown:\n{"totalScore":<n>,"maxScore":<n>,"percentage":<n>,"grade":"A|B|C|D|F","studentName":"","questions":[{"id":"","description":"","marksAwarded":<n>,"marksAvailable":<n>,"code":"<B1|M1|A1 etc>","feedback":"","correct":<bool>,"misconception":null,"uncertain":<bool>}],"overallFeedback":"","strengths":[],"improvements":[],"annotations":[{"region":"top-left|top-right|bottom-left|bottom-right|center","text":"","type":"correct|incorrect|comment"}]}`;
      const typedAnswerText = extraAnswers && Object.keys(extraAnswers).length>0
        ? Object.entries(extraAnswers).map(([id,ans])=>`${id}: ${ans}`).join("\n")
        : "";
      const msgText = typedAnswerText
        ? `Mark this paper.\n\nSTUDENT ANSWERS:\n${typedAnswerText}`
        : "Mark this paper.";
      const text=await callAPI([{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:msgText}]}],sys,2500);
      const parsed=parseJSON(text);

        if(parsed._offlineNeedsText){
          setMarkingStep("Running local OCR — reading handwriting…");
          let ocrText = "";
          try {
            const preprocessed = await preprocessForOCR(img);
            ocrText = await runTesseractOCR(preprocessed);
          } catch(ocrErr) {
            const schemeLines=(globalScheme||"").split(/\n/).map(l=>l.trim()).filter(Boolean);
            const schemeQs=schemeLines.map((line,i)=>{
              const stripped=line.replace(/^Q(?:n|uestion)?\s*\d+[a-z]?[\s\)\.:\-]*/i,"").replace(/^\d+[a-z]?[\.\)\s]+/,"").trim();
              const text_=stripped.replace(/\b[BMACPEF][0-9]\b/gi,"").replace(/^[-•*]\s*/,"").trim();
              return text_.length>2?{id:`Q${i+1}`,description:text_.slice(0,80),studentAnswer:"",canRead:false,confidence:"low",readingNote:`OCR unavailable: ${ocrErr.message}. Type the answer manually.`}:null;
            }).filter(Boolean);
            if(schemeQs.length===0) schemeQs.push({id:"Q1",description:"Student answer",studentAnswer:"",canRead:false,confidence:"low",readingNote:"OCR unavailable — type the answer below"});
            setUncertainQs(schemeQs); setManualAnswers({});
            setReviewMode("manual"); setMarking(false); setMarkingStep("");
            setError("⚠ Local OCR unavailable. Type student answers manually.");
            return;
          }

          if (ocrText.length < 5) {
            const schemeLines=(globalScheme||"").split(/\n/).map(l=>l.trim()).filter(Boolean);
            const schemeQs=schemeLines.map((line,i)=>{
              const stripped=line.replace(/^Q(?:n|uestion)?\s*\d+[a-z]?[\s\)\.:\-]*/i,"").replace(/^\d+[a-z]?[\.\)\s]+/,"").trim();
              const text_=stripped.replace(/\b[BMACPEF][0-9]\b/gi,"").replace(/^[-•*]\s*/,"").trim();
              return text_.length>2?{id:`Q${i+1}`,description:text_.slice(0,80),studentAnswer:"",canRead:false,confidence:"low",readingNote:"OCR could not read this image — handwriting may be too unclear. Type the answer below."}:null;
            }).filter(Boolean);
            if(schemeQs.length===0) schemeQs.push({id:"Q1",description:"Student answer",studentAnswer:"",canRead:false,confidence:"low",readingNote:"Could not read image — type answer below"});
            setUncertainQs(schemeQs); setManualAnswers({});
            setReviewMode("manual"); setMarking(false); setMarkingStep("");
            setError("⚠ OCR could not read enough text. Please type the student's answers below.");
            return;
          }

          setMarkingStep("Handwriting extracted — comparing against mark scheme…");
          await new Promise(r=>setTimeout(r,300));
          const ocrResult = await callAPI(
            [{role:"user",content:`STUDENT ANSWERS:\n${ocrText}`}],
            sys, 2500
          );
          const ocrParsed = parseJSON(ocrResult);
          ocrParsed._ocrText = ocrText;
          ocrParsed.image = img;
          setResults(ocrParsed);
          setReviewMode(null); setUncertainQs([]); setManualAnswers({});
          setTab("results");
          return;
        }

      setResults({...parsed,image:img});
      setReviewMode(null); setUncertainQs([]); setManualAnswers({});
      setTab("results");
    }catch(e){
      if(e.message&&(e.message.includes("key not set")||e.message.includes("API key")||e.message.includes("401")||e.message.includes("403"))){
        setError("No API key set. Switch to Offline Mode in the sidebar to mark using your mark scheme, or add an API key in Privacy & Data.");
      } else {
        setError("Marking failed: "+e.message);
      }
    }
    finally{setMarking(false);setMarkingStep("");}
  },[callAPI,offlineMode,apiReady,subject,totalMarks,studentName,globalScheme,globalMisconceptions,webSearchEnabled,webSearchKey,searchWeb,runTesseractOCR,preprocessForOCR]);

  /* ── extractAndReview — OCR pass to flag questions AI can't read ── */
  const extractAndReview=useCallback(async(img)=>{
    if(offlineMode || (!offlineMode && !apiReady)){
      setMarking(true); setMarkingStep("Running local OCR — reading paper…");
      try {
        const preprocessed = await preprocessForOCR(img);
        const ocrText = await runTesseractOCR(preprocessed, false, topicSubject||subject||"");
        const schemeLines=(globalScheme||"").split(/\n/).map(l=>l.trim()).filter(Boolean);
        const schemeQs=schemeLines.map((line,i)=>{
          const stripped=line.replace(/^Q(?:n|uestion)?\s*\d+[a-z]?[\s\)\.:\-]*/i,"").replace(/^\d+[a-z]?[\.\)\s]+/,"").trim();
          const text_=stripped.replace(/\b[BMACPEF][0-9]\b/gi,"").replace(/^[-•*]\s*/,"").trim();
          return text_.length>2?{
            id:`Q${i+1}`, description:text_.slice(0,80),
            studentAnswer: ocrText,  // give OCR text to first question (teacher can edit)
            canRead: ocrText.length>10,
            confidence: ocrText.length>30?"medium":"low",
            readingNote: ocrText.length>10?"OCR extracted text — verify before marking":"OCR could not read clearly — check and correct below"
          }:null;
        }).filter(Boolean);
        schemeQs.forEach((q,i)=>{ if(i>0){q.studentAnswer=""; q.canRead=false; q.readingNote="Check OCR text above, type this answer separately";} });
        if(schemeQs.length===0) schemeQs.push({id:"Q1",description:"Student answer",studentAnswer:ocrText,canRead:ocrText.length>10,confidence:"low",readingNote:"OCR extracted text above — verify"});
        setUncertainQs(schemeQs); setManualAnswers({Q1:ocrText});
        setReviewMode("manual"); setMarking(false); setMarkingStep("");
        if(ocrText.length<10) setError("⚠ OCR could not read much text — handwriting may be unclear. Review and correct below.");
      } catch(e) {
        const pts=(globalScheme||"").split(/\n/).map(l=>l.trim()).filter(Boolean)
          .map((line,i)=>{const s=line.replace(/^Q(?:n|uestion)?\s*\d+[a-z]?[\s\)\.:\-]*/i,"").trim().replace(/\b[BMACPEF][0-9]\b/gi,"").trim();return s.length>2?{id:`Q${i+1}`,description:s.slice(0,80),studentAnswer:"",canRead:false,confidence:"low",readingNote:"OCR failed — type the answer below"}:null;}).filter(Boolean);
        setUncertainQs(pts.length>0?pts:[{id:"Q1",description:"Student answer",studentAnswer:"",canRead:false,confidence:"low",readingNote:"Type the answer below"}]);
        setManualAnswers({}); setReviewMode("manual"); setMarking(false); setMarkingStep("");
        setError("Local OCR unavailable. Enter answers manually.");
      }
      return;
    }
    setMarking(true);setMarkingStep("Reading paper — identifying questions…");
    try{
      const b64=img.split(",")[1];
      const sys=`You are an expert at reading student exam papers.\nSubject: ${subject||"General"}\nMARKING SCHEME: ${globalScheme||"No scheme provided — infer questions from the paper."}\n\nRead this paper carefully. For each question you can identify, return the question ID, a brief description, and the student's answer if you can read it confidently. If the handwriting for a question is illegible or ambiguous, set "canRead" to false and leave "studentAnswer" blank — the teacher will supply it.\n\nRespond ONLY with valid JSON:\n{"studentName":"<if visible on paper>","questions":[{"id":"Q1","description":"<question text or topic>","studentAnswer":"<transcribed answer or blank if illegible>","canRead":<true|false>,"confidence":"high|medium|low","readingNote":"<brief note if unclear>"}]}`;
      const text=await callAPI([{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:"Extract the questions and student answers from this paper."}]}],sys,1500);
      const parsed=parseJSON(text);
      if(parsed.studentName&&!studentName) setStudentName(parsed.studentName);
      const uncertain=(parsed.questions||[]).filter(q=>!q.canRead||q.confidence==="low");
      if(uncertain.length===0){
        setMarkingStep("All questions readable — marking now…");
        await markWhole(img);
      } else {
        setUncertainQs(parsed.questions||[]);
        setManualAnswers({});
        setReviewMode("manual");
        setMarking(false);setMarkingStep("");
      }
    }catch(e){setError("Reading failed: "+e.message);setMarking(false);setMarkingStep("");}
  },[callAPI,offlineMode,apiReady,subject,globalScheme,studentName,markWhole,runTesseractOCR,preprocessForOCR]);

  /* ── stitchPages — joins scanned pages into one image, returns base64 ── */
  const stitchPages=useCallback(async()=>{
    if(!scannedPages.length)return null;
    if(scannedPages.length===1)return scannedPages[0];
    setMarkingStep("Stitching pages…");
    const imgs=await Promise.all(scannedPages.map(s=>new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=s;})));
    const w=Math.max(...imgs.map(i=>i.naturalWidth)),h=imgs.reduce((s,i)=>s+i.naturalHeight,0);
    const c=document.createElement("canvas");c.width=w;c.height=h;
    const ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);
    let y=0;imgs.forEach(i=>{ctx.drawImage(i,0,y);y+=i.naturalHeight;});
    return c.toDataURL("image/jpeg",0.92);
  },[scannedPages]);

  /* ── stitchAndReview — stitch then show review screen ── */
  const stitchAndReview=useCallback(async()=>{
    if(!scannedPages.length)return;
    if(autoActive)setAutoActive(false);
    setMarking(true);setMarkingStep("Stitching pages…");
    try{
      const img=await stitchPages();
      setStitchedImage(img);
      setReviewMode("review");
    }catch(e){setError("Stitch failed: "+e.message);}
    finally{setMarking(false);setMarkingStep("");}
  },[scannedPages,autoActive,stitchPages]);

  /* ── Recalculate totals after manual question override ── */
  const recalcResults=useCallback((updatedQs)=>{
    const total=updatedQs.reduce((s,q)=>s+(q.marksAwarded||0),0);
    const max=updatedQs.reduce((s,q)=>s+(q.marksAvailable||0),0);
    const pct=max>0?Math.round(total/max*100):0;
    const grade=pct>=80?"A":pct>=65?"B":pct>=50?"C":pct>=40?"D":"F";
    setResults(prev=>({...prev,questions:updatedQs,totalScore:total,maxScore:max,percentage:pct,grade}));
  },[]);

  /* ── Load image files into the batch queue ── */
  /* ── Convert a file to a batch queue item ── */
  const fileToQueueItem = useCallback(async (file) => {
    const rawName = file.name.replace(/\.[^.]+$/, "").replace(/[-_]/g," ")
      .replace(/\b\w/g, c => c.toUpperCase());
    const base = { id: Date.now()+Math.random(), name: rawName,
                   status: "pending", results: null, error: null };

    const isPDF  = file.type === "application/pdf" || /\.pdf$/i.test(file.name);
    const isDOCX = /\.(docx|doc)$/i.test(file.name)
                || file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                || file.type === "application/msword";
    const isImg  = file.type.startsWith("image/");

    if (isImg) {
      return new Promise(res => {
        const r = new FileReader();
        r.onload = e => res({ ...base, fileType:"image", imageB64: e.target.result, textContent: null });
        r.readAsDataURL(file);
      });
    }

    if (isPDF) {
      try {
        if (typeof pdfjsLib === "undefined")
          throw new Error("PDF.js not loaded — check internet connection.");

        const arrayBuf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
        const numPages = Math.min(pdf.numPages, 6); // cap at 6 pages per paper

        const canvases = [];
        for (let p = 1; p <= numPages; p++) {
          const page  = await pdf.getPage(p);
          const scale = 1.8; // ~130 DPI — good balance of quality vs speed
          const vp    = page.getViewport({ scale });
          const canvas= document.createElement("canvas");
          canvas.width  = vp.width;
          canvas.height = vp.height;
          await page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
          canvases.push(canvas);
        }

        const totalW = Math.max(...canvases.map(c => c.width));
        const totalH = canvases.reduce((s, c) => s + c.height, 0);
        const stitched = document.createElement("canvas");
        stitched.width  = totalW;
        stitched.height = totalH;
        const ctx = stitched.getContext("2d");
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, totalW, totalH);
        let y = 0;
        canvases.forEach(c => { ctx.drawImage(c, 0, y); y += c.height; });

        const imageB64 = stitched.toDataURL("image/jpeg", 0.92);
        return { ...base, fileType: "pdf", imageB64, textContent: null,
                 pageCount: numPages };
      } catch(e) {
        return { ...base, fileType: "pdf", imageB64: null, textContent: null,
                 status: "failed", error: "PDF error: " + e.message };
      }
    }

    if (isDOCX) {
      try {
        if (typeof mammoth === "undefined")
          throw new Error("mammoth.js not loaded — check internet connection.");

        const arrayBuf = await file.arrayBuffer();
        let textContent = "";

        if (/\.docx$/i.test(file.name) ||
            file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document") {
          const result = await mammoth.extractRawText({ arrayBuffer: arrayBuf });
          textContent = result.value.trim();
        } else {
          try {
            const result = await mammoth.extractRawText({ arrayBuffer: arrayBuf });
            textContent = result.value.trim();
          } catch {
            throw new Error(".doc format has limited support. Please save as .docx and re-upload.");
          }
        }

        if (!textContent) throw new Error("No text could be extracted from this document.");
        return { ...base, fileType: "docx", imageB64: null, textContent,
                 wordCount: textContent.split(/\s+/).length };
      } catch(e) {
        return { ...base, fileType: "docx", imageB64: null, textContent: null,
                 status: "failed", error: "Document error: " + e.message };
      }
    }

    return { ...base, fileType: "unknown", imageB64: null, textContent: null,
             status: "failed", error: `Unsupported file type: ${file.type || file.name.split('.').pop()}` };
  }, []);

  /* ── Add files to batch queue ── */
  const batchAddFiles = useCallback(async (files) => {
    const supported = [...files].filter(f =>
      f.type.startsWith("image/") ||
      f.type === "application/pdf" || /\.pdf$/i.test(f.name) ||
      /\.(docx|doc)$/i.test(f.name) ||
      f.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document" ||
      f.type === "application/msword"
    );
    if (!supported.length) { setError("No supported files. Upload images (JPG/PNG), PDFs, or Word documents (.docx)."); return; }

    const placeholders = supported.map(f => ({
      id: Date.now()+Math.random(), name: f.name, fileType:"loading",
      status:"pending", imageB64:null, textContent:null, error:null
    }));
    setBatchQueue(prev => [...prev, ...placeholders]);
    setBatchDone(false);

    const items = await Promise.all(supported.map(fileToQueueItem));
    setBatchQueue(prev => {
      const next = [...prev];
      let pi = 0;
      for (let i = next.length - placeholders.length; i < next.length; i++) {
        next[i] = items[pi++];
      }
      return next;
    });
  }, [fileToQueueItem]);

  /* ── Mark all queued papers sequentially ── */
  const batchMark=useCallback(async()=>{
    if(!batchQueue.length)return;
    batchStopRef.current=false;
    setBatchRunning(true);setBatchDone(false);

    const snapshot=[...batchQueue];

    const scheme=globalScheme.trim()||"Apply standard UK academic marking.";
    const baseSys=`You are an expert examiner marking a student paper.\nSubject: ${subject||"General"}${totalMarks?`\nMax marks: ${totalMarks}`:""}\nMARKING SCHEME: ${scheme}\n${globalMisconceptions?`MISCONCEPTIONS: ${globalMisconceptions}`:""}\nFor each question use B/M/A mark codes from the marking scheme.\nRespond ONLY with valid JSON, no markdown:\n{"totalScore":<n>,"maxScore":<n>,"percentage":<n>,"grade":"A|B|C|D|F","studentName":"<from paper or blank>","questions":[{"id":"","description":"","marksAwarded":<n>,"marksAvailable":<n>,"code":"","feedback":"","correct":<bool>,"misconception":null}],"overallFeedback":"","strengths":[],"improvements":[],"annotations":[{"region":"top-left|top-right|bottom-left|bottom-right|center","text":"","type":"correct|incorrect|comment"}]}`;

    const runLocalMark = (answerText) => {
      const ans = (answerText||"").toLowerCase();
      const lines = scheme.split(/\n/).map(l=>l.trim()).filter(Boolean);
      const stopWords=new Set(["the","a","an","and","or","of","to","in","is","are","was","were","it","its","for","on","at","by","as","with","from","that","this","be","been","being","have","has","had","do","does","did","will","would","can","could","should","not","no","all","any","each","per","use","used","show","shown","give","given","required","needed","through","using","energy","correct","named","examples","least"]);
      const kws=w=>w.toLowerCase().match(/\b[a-z]{4,}\b/g)?.filter(w=>!stopWords.has(w))||[];
      const exNums=s=>(s.match(/-?[\d]+(?:\.\d+)?/g)||[]).map(Number);
      const stemMatch=(w,text)=>{
        const e=w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
        if(new RegExp('\\b'+e+'s?\\b','i').test(text)) return true;
        const stem=w.replace(/(?:ses|ies|es|s)$/i,'');
        return stem.length>=3&&new RegExp('\\b'+stem.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'[a-z]{0,4}\\b','i').test(text);
      };
      const points=[];
      lines.forEach(line=>{
        const stripped=line.replace(/^Q(?:n|uestion)?\s*\d+[a-z]?[\s\)\.:\-]*/i,"").replace(/^\d+[a-z]?[\.\)\s]+/,"").replace(/^[a-z][\)\.]\s*/i,"").replace(/^\([a-z]\)\s*/i,"").trim();
        if(!stripped||stripped.length<3) return;
        const codeM=stripped.match(/\b([BMACPEF][0-9])\b/i);
        const code=codeM?codeM[1].toUpperCase():"B1";
        const text=stripped.replace(/\b[BMACPEF][0-9]\b/gi,"").replace(/^[-•*—]\s*/,"").trim();
        const nums=exNums(text);
        if(text.length>2) points.push({code,text,nums});
      });
      const maxPts=totalMarks?parseInt(totalMarks):points.length||1;
      if(points.length===0) for(let i=0;i<maxPts;i++) points.push({code:"B1",text:`Mark point ${i+1}`,nums:[]});
      const marked=points.map(pt=>{
        const ptWords=kws(pt.text),ptNums=pt.nums||[];
        let awarded=false;
        if(ptNums.length>0){const exp=ptNums[ptNums.length-1];awarded=exNums(ans).some(n=>Math.abs(n-exp)<0.01);}
        if(!awarded&&ptWords.length>0){const hits=ptWords.filter(w=>stemMatch(w,ans)).length;// Cap at 3 keywords for long mark points
            var sw=ptWords.slice().sort(function(a,b){return b.length-a.length;});
            var mw=sw.length>3?sw.slice(0,3):sw;
            var mh=mw.filter(function(w){return stemM(w,a);}).length;
            awarded=mw.length<=2?mh>=1:mh>=2;}
        return{...pt,awarded};
      });
      const avail=Math.min(points.length,maxPts);
      const awarded=Math.min(marked.filter(p=>p.awarded).length,avail);
      const pct=avail>0?Math.round((awarded/avail)*100):0;
      const grade=pct>=(gradeBounds.A||70)?"A":pct>=(gradeBounds.B||55)?"B":pct>=(gradeBounds.C||40)?"C":pct>=(gradeBounds.D||25)?"D":"F";
      return {
        totalScore:awarded,maxScore:avail,percentage:pct,grade,
        studentName:"",
        questions:marked.map((p,i)=>({
          id:`Q${i+1}`,description:p.text.slice(0,50),
          marksAwarded:p.awarded?1:0,marksAvailable:1,code:p.code,
          feedback:p.awarded?`✓ ${p.text}`:`✗ Not evidenced: ${p.text}`,
          correct:p.awarded,misconception:p.awarded?null:`Missing: ${p.text}`
        })),
        overallFeedback:pct>=70?"Good performance — most mark scheme criteria met.":pct>=40?"Partial marks — some criteria not evidenced.":"Answer does not address the mark scheme criteria.",
        strengths:marked.filter(p=>p.awarded).map(p=>p.text).slice(0,3),
        improvements:marked.filter(p=>!p.awarded).map(p=>`Include: ${p.text}`).slice(0,3),
        annotations:[{region:"top-right",text:`${awarded}/${avail}`,type:"comment"},{region:"top-left",text:"📋 Offline",type:"comment"}]
      };
    };

    for(let i=0;i<snapshot.length;i++){
      if(batchStopRef.current)break;
      const item=snapshot[i];
      if(item.status==="done")continue;
      if(item.status==="failed")continue;

      setBatchQueue(prev=>prev.map((it,idx)=>idx===i?{...it,status:"marking"}:it));

      try{
        let parsed;

        if(offlineMode){
          if(item.fileType==="docx"&&item.textContent){
            parsed=runLocalMark(item.textContent);
            parsed.studentName=item.name;
          } else if((item.fileType==="pdf"||item.fileType==="image")&&item.imageB64){
            setBatchQueue(prev=>prev.map((it,idx)=>idx===i?{...it,status:"marking",ocrStatus:"Running local OCR…"}:it));
            try {
              const preprocessed = await preprocessForOCR(item.imageB64);
              const ocrText = await runTesseractOCR(preprocessed, false, topicSubject||subject||"");
              if(ocrText.length < 5){
                parsed={
                  totalScore:0, maxScore:totalMarks?parseInt(totalMarks):1,
                  percentage:0, grade:"—", studentName:item.name,
                  questions:[], overallFeedback:"",
                  strengths:[], improvements:[],
                  _ocrFailed:true,
                  offlineMessage:"OCR could not extract text from this image — handwriting may be too unclear or image quality too low."
                };
              } else {
                parsed=runLocalMark(ocrText);
                parsed.studentName=item.name;
                parsed._ocrText=ocrText; // preserve for teacher review
              }
            } catch(ocrErr) {
              parsed={
                totalScore:0, maxScore:totalMarks?parseInt(totalMarks):1,
                percentage:0, grade:"—", studentName:item.name,
                questions:[], overallFeedback:"",
                strengths:[], improvements:[],
                _ocrFailed:true,
                offlineMessage:"Local OCR error: "+ocrErr.message
              };
            }
          } else {
            throw new Error("No content to mark — file may have failed to load.");
          }
        } else {
          let text="";
          if(item.fileType==="docx"&&item.textContent){
            const wordLimit=3000;
            const truncated=item.textContent.length>wordLimit
              ? item.textContent.slice(0,wordLimit)+"…[truncated]"
              : item.textContent;
            text=await callAPI(
              [{role:"user",content:`Student name: ${item.name}\n\nPaper content:\n\n${truncated}`}],
              baseSys, 2500
            );
          } else if(item.imageB64){
            const b64=item.imageB64.split(",")[1];
            text=await callAPI(
              [{role:"user",content:[
                {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
                {type:"text",text:`Mark this paper. Student name if visible: ${item.name}${item.pageCount?` (${item.pageCount}-page PDF rendered as image)`:""}`}
              ]}],
              baseSys, 2500
            );
          } else {
            throw new Error("No content to mark — file may have failed to load.");
          }
          parsed=parseJSON(text);
        }

        const finalName=(parsed.studentName?.trim())||item.name;
        snapshot[i]={...item,status:"done",name:finalName,results:{...parsed,image:item.imageB64||null}};
        setBatchQueue(prev=>prev.map((it,idx)=>idx===i?{
          ...it,status:"done",name:finalName,
          results:{...parsed,image:item.imageB64||null},
          error:null
        }:it));
      }catch(e){
        snapshot[i]={...item,status:"failed",error:e.message};
        setBatchQueue(prev=>prev.map((it,idx)=>idx===i?{...it,status:"failed",error:e.message}:it));
      }

      if(i<snapshot.length-1&&!batchStopRef.current){
        await new Promise(r=>setTimeout(r,offlineMode?200:600));
      }
    }
    setBatchRunning(false);setBatchDone(true);
  },[batchQueue,callAPI,offlineMode,subject,totalMarks,globalScheme,globalMisconceptions,gradeBounds,runTesseractOCR,preprocessForOCR]);

  /* ── Save all completed batch results to a class folder ── */
  const batchSaveAll=useCallback(()=>{
    const paperName=batchPaper.trim()||subject||"Batch Paper";
    const pid=paperName.toLowerCase().replace(/\s+/g,"-");
    const done=batchQueue.filter(it=>it.status==="done"&&it.results);
    if(!done.length){setError("No completed results to save.");return;}

    const newStudents=done.map(it=>({
      id:Date.now()+Math.random(),
      name:it.name,
      timestamp:new Date().toISOString(),
      originalImage:it.imageB64||null,
      markedImage:null, // no canvas annotation in batch mode
      results:it.results,
      feedbackHTML:genFeedbackHTML(it.name,paperName,it.results),
    }));

    setClasses(prev=>({...prev,[pid]:{
      name:paperName, subject:subject||"",
      date:new Date().toLocaleDateString("en-GB"),
      students:[...(prev[pid]?.students||[]).filter(s=>!newStudents.find(n=>n.name===s.name)),...newStudents]
    }}));
    setExpandedPaper(pid);setTab("classes");setSidebarOpen(false);
  },[batchQueue,batchPaper,subject,genFeedbackHTML]);

  /* ── quick mark ── */
  const handleImageUpload=useCallback(async file=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=async e=>{
      const b64=e.target.result;setQmImageB64(b64);setQmImageURL(URL.createObjectURL(file));setQmOcr("");setQmResult(null);setQmOcrLoading(true);
      try{const data=b64.split(",")[1];const text=await callAPI([{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data}},{type:"text",text:"Transcribe the handwritten student answer. Output only the text, no commentary."}]}],"Expert at reading handwritten student answers.",800);
        setQmOcr(text.trim());
        setQmOcrOriginal(text.trim());
      }
      catch{setQmOcr("(OCR failed — type the answer below)");}
      finally{setQmOcrLoading(false);}
    };
    reader.readAsDataURL(file);
  },[callAPI]);

  /* ── Quick Mark — PDF / DOCX upload ── */
  const handleQmDocUpload=useCallback(async(file)=>{
    if(!file)return;
    setQmDocLoading(true); setQmDocText(""); setQmDocName(file.name); setQmResult(null);
    try{
      const item = await fileToQueueItem(file);
      if(item.status==="failed") throw new Error(item.error||"Could not read file");
      if(item.fileType==="docx"&&item.textContent){

      } else if(item.imageB64){

        setQmImageURL(item.imageB64);
        setQmMode("image");
        setQmOcrLoading(true);
        try{
          const b64=item.imageB64.split(",")[1];
          const text=await callAPI([{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:"Transcribe the handwritten or typed student answer. Output only the text, no commentary."}]}],"Expert at reading student answers.",800);
          setQmOcr(text.trim()); setQmOcrOriginal(text.trim());
        }catch{setQmOcr("(OCR failed — edit below)");}
        finally{setQmOcrLoading(false);}
      }
    }catch(e){setError("Could not read file: "+e.message);}
    finally{setQmDocLoading(false);}
  },[fileToQueueItem,callAPI]);

  /* ── Parse mark scheme into AR overlay hints ── */
  /* ─────────────────────────────────────────────────────────────
     parseSchemeIntoQuestions
     Splits the global mark scheme into per-question sections.
     Handles formats:
       "Q1"  "Q2a"  "Q2 a)"  "Question 3"
       "1."  "2."  "(1)"  "1a."
       "Part a)"  "a)"  "i)"  "ii)"
     Returns: [{id, label, hints:[{code,text,col,left,top}]}]
  ─────────────────────────────────────────────────────────────── */
  const parseSchemeIntoQuestions = useCallback(() => {
    const scheme = (globalScheme || "").trim();
    if (!scheme) return [];

    const lines = scheme.split(/\n/).map(l => l.trim()).filter(Boolean);

    const Q_HEADER = /^(?:Q(?:uestion)?\s*(\d+)\s*([a-e])?[\s:.)\-]*$|Q(?:uestion)?\s*(\d+)\s*\(([a-e])\)|(\d+)\s*([a-e])\)|(\d+)\s*([a-e])?\s*[:.]\s*$|Part\s+([a-e])[:.)]?|^\(?([a-e])\)[\s:.]*$|^([ivx]+)\))/i;

    const HINT_POSITIONS = [
      {left:"4%",  top:"12%"}, {left:"54%", top:"12%"},
      {left:"4%",  top:"34%"}, {left:"54%", top:"34%"},
      {left:"4%",  top:"55%"}, {left:"54%", top:"55%"},
      {left:"4%",  top:"75%"}, {left:"54%", top:"75%"},
    ];

    const buildHints = (markLines) => {
      const hints = [];
      let pi = 0;
      for (const line of markLines) {
        if (pi >= HINT_POSITIONS.length) break;
        if (line.length < 3) continue;
        if (/^Q\d|^Question\s*\d/i.test(line) && line.length < 20) continue;
        const codeMatch = line.match(/\b([BMAP]\d)\b/i);
        const code = codeMatch ? codeMatch[1].toUpperCase() : "";
        const isB = code.startsWith("B");
        const isM = code.startsWith("M");
        const isA = code.startsWith("A");
        const col = isB ? "#3dd68c" : isM ? "#6c8ff5" : isA ? "#f5c842" : "#f0956b";
        const text = line
          .replace(/\b[BMAP]\d\b\s*/gi, "")
          .replace(/^\d+[\.\)]\s*/, "")
          .replace(/^[ivx]+\)\s*/i, "")
          .replace(/^award\s+\d+\s+mark\s+for\s*/i, "")
          .trim()
          .slice(0, 90);
        if (!text) continue;
        hints.push({ code: code || "✓", text, col, ...HINT_POSITIONS[pi++] });
      }
      return hints;
    };

    const buckets = []; // [{rawId, label, lines[]}]
    let current = null;

    for (const line of lines) {
      const isHeader = Q_HEADER.test(line) && line.length < 40;
      if (isHeader) {
        current = { rawId: line, label: line.replace(/[:.)\s]+$/,"").trim(), lines: [] };
        buckets.push(current);
      } else {
        if (!current) {
          current = { rawId:"general", label:"General", lines:[] };
          buckets.push(current);
        }
        current.lines.push(line);
      }
    }

    if (buckets.length <= 1 && buckets[0]?.rawId === "general") {
      const numbered = [];
      let cur = null;
      for (const line of lines) {
        const nm = line.match(/^(?:Q?(\d+)\s*([a-e])?[:.)\s])/i);
        if (nm) {
          const qn = nm[1], qp = nm[2]||"";
          const lbl = `Q${qn}${qp.toLowerCase()}`;
          cur = { rawId: lbl, label: lbl, lines: [line] };
          numbered.push(cur);    } else if (cur) {
          cur.lines.push(line);
        } else {
          cur = { rawId:"general", label:"General", lines:[line] };
          numbered.push(cur);
        }
      }
      if (numbered.length > 1) {
        buckets.length = 0;
        numbered.forEach(b => buckets.push(b));
      }
    }

    const questions = buckets
      .filter(b => b.lines.length > 0)
      .map((b, i) => ({
        id:    b.label.toLowerCase().replace(/\s+/g,""),
        label: b.label,
        hints: buildHints(b.lines),
        order: i,
      }));

    return questions;
  }, [globalScheme]);

  /* Keep parsedSchemeQs in sync with scheme and reset selection when overlay opens */
  useEffect(() => {
    if (overlayOn) {
      const qs = parseSchemeIntoQuestions();
      setParsedSchemeQs(qs);
      setOverlayQId(qs.length > 0 ? qs[0].id : "all");
    }
  }, [overlayOn, globalScheme, parseSchemeIntoQuestions]);

  /* Legacy — kept so nothing referencing parseSchemeHints breaks */
  const parseSchemeHints = useCallback(() => {
    const qs = parseSchemeIntoQuestions();
    if (!qs.length) return [];
    const sel = qs.find(q => q.id === overlayQId);
    return sel ? sel.hints : qs.flatMap(q => q.hints).slice(0, 8);
  }, [parseSchemeIntoQuestions, overlayQId]);

  const handleMark=useCallback(async()=>{
    const answer = qmMode==="image" ? qmOcr
                 : qmMode==="doc"   ? qmDocText
                 : qmPasted;
    if(!answer.trim()){setError("Please provide a student answer.");return;}
    if(qmMode==="image" && qmOcr && qmOcr!==qmOcrOriginal && qmOcrOriginal) {
      recordCorrection("ocr", qmOcrOriginal, qmOcr, { question:qmQuestion, subject });
    }
    const scheme=qmScheme.trim()||globalScheme.trim();
    const hasB = /\bB\d/i.test(scheme);
    const hasM = /\bM\d/i.test(scheme);
    const hasA = /\bA\d/i.test(scheme);
    const hasP = /\bP\d/i.test(scheme);
    const markTypes = [hasB?"B (knowledge/fact)":"", hasM?"M (method)":"", hasA?"A (accuracy)":"", hasP?"P (process)":""].filter(Boolean).join(", ") || "B (knowledge), M (method), A (accuracy)";
    const sys=`You are an expert examiner marking a single student answer for a UK school.\n${subject?`Subject: ${subject}`:""}\n${qmQuestion?`Question: ${qmQuestion}`:""}\nMark Scheme: ${scheme||"Apply appropriate UK academic standards."}\n${globalMisconceptions?`Misconceptions to watch for: ${globalMisconceptions}`:""}\n\nANNOTATION STYLE:\nUse proper exam board annotation notation. Detected mark types in this scheme: ${markTypes}.\nFor each marking point assign the correct mark code (B1, B2, M1, M2, A1, A2, P1, P2 etc.).\n\nRespond ONLY with valid JSON, no markdown:\n{"marksAwarded":<n>,"marksAvailable":<n or null>,"percentage":<0-100>,"breakdown":[{"point":"<mark scheme point text>","code":"<B1|M1|A1|P1 etc>","awarded":<bool>,"comment":"<why awarded or not>"}],"annotations":[{"label":"<B1✓ or M1✗ etc>","type":"correct|incorrect|partial","placement":"<top-left|top-right|middle-left|middle-right|bottom-left|bottom-right>"}],"feedback":"<2-3 sentences directly to student>","misconceptions":[],"strengths":[],"improvements":[]}`;
    setQmAnnotReady(false);
    setQmLoading(true);setQmResult(null);setError(""); setMarkingStep("Analysing student answer…");
    try{
      setMarkingStep("Comparing answer to mark scheme…"); await new Promise(r=>setTimeout(r,200));
      const text=await callAPI([{role:"user",content:`Student answer:\n\n${answer}`}],sys,1200);
      const parsed=parseJSON(text);
      parsed._aiMarks    = parsed.marksAwarded;
      parsed._aiFeedback = parsed.feedback;
      setQmResult(parsed);setQmEditing(false);
    }
    catch(e){setError("Marking failed: "+e.message);}
    finally{setQmLoading(false);setMarkingStep("");}
  },[callAPI,qmMode,qmOcr,qmOcrOriginal,qmPasted,qmDocText,qmScheme,globalScheme,globalMisconceptions,subject,qmQuestion,recordCorrection]);

  const handleAccept=useCallback(()=>{
    if(!qmResult)return;
    const originalResult = qmResult._original || qmResult;
    if (qmEditing && originalResult._aiMarks !== undefined && qmResult.marksAwarded !== originalResult._aiMarks) {
      recordCorrection("marks", originalResult._aiMarks, qmResult.marksAwarded, {
        question: qmQuestion, studentAnswer: qmMode==="image"?qmOcr:qmPasted, feedback: qmResult.feedback, markScheme: qmScheme||globalScheme
      });
    }
    if (qmEditing && originalResult._aiFeedback && qmResult.feedback !== originalResult._aiFeedback) {
      recordCorrection("feedback", originalResult._aiFeedback, qmResult.feedback, {
        question: qmQuestion, studentAnswer: qmMode==="image"?qmOcr:qmPasted, marks: qmResult.marksAwarded, markScheme: qmScheme||globalScheme
      });
    }
    setSaved(p=>[{id:Date.now(),question:qmQuestion||"(no question)",score:`${qmResult.marksAwarded}${qmResult.marksAvailable?"/"+qmResult.marksAvailable:""}`,pct:qmResult.percentage,feedback:qmResult.feedback,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),result:qmResult},...p]);
    setQmResult(null);
    setQmOcr("");setQmOcrOriginal("");setQmPasted("");
    setQmDocText("");setQmDocName("");
    setQmQuestion("");setQmScheme("");
    setQmImageB64(null);setQmImageURL(null);
    setQmMode("image"); // always return to image mode
    setQmEditing(false);setQmAnnotReady(false);
  },[qmResult,qmQuestion,qmMode,qmOcr,qmPasted,qmDocText,qmScheme,globalScheme,qmEditing,recordCorrection]);

  /* ── annotation canvas ── */
  useEffect(()=>{
    if(!results||!annotRef.current)return;
    const canvas=annotRef.current,img=new Image();
    img.onload=()=>{
      canvas.width=img.naturalWidth;canvas.height=img.naturalHeight;
      const ctx=canvas.getContext("2d");ctx.drawImage(img,0,0);
      const W=canvas.width,H=canvas.height,fs=Math.max(24,Math.round(W*.022));
      (results.annotations||[]).forEach(a=>{
        const rm={"top-left":[W*.05,H*.04],"top-right":[W*.75,H*.04],"bottom-left":[W*.05,H*.92],"bottom-right":[W*.75,H*.92],"center":[W*.35,H*.5]};
        const[x,y]=rm[a.region]||[W*.05,H*.05];
        const col=a.type==="correct"?"#3dd68c":a.type==="incorrect"?"#e8473f":"#f5c842";
        ctx.font=`bold ${fs}px Inter,sans-serif`;const m=ctx.measureText(a.text),p=fs*.5;
        ctx.fillStyle="rgba(255,255,255,0.92)";rrect(ctx,x-p*.6,y-fs,m.width+p*1.2,fs*1.6,6);ctx.fill();
        ctx.fillStyle=col;ctx.fillText(a.text,x,y);

      if(results.totalScore!=null){
        const s=`${results.totalScore}/${results.maxScore??"?"}`,sf=Math.max(36,Math.round(W*.04));
        ctx.font=`bold ${sf}px Playfair Display,serif`;const m=ctx.measureText(s),sx=W-m.width-W*.04,sy=H*.06;
        ctx.fillStyle="rgba(255,255,255,0.94)";rrect(ctx,sx-12,sy-sf,m.width+24,sf*1.5,8);ctx.fill();
        ctx.fillStyle="#e8473f";ctx.fillText(s,sx,sy);
      }
    };
    img.src=results.image;
  },[results]);

  const downloadAnnotated=()=>{const link=document.createElement("a");const n=results?.studentName||studentName||"student";link.download=`NovaVista_${n.replace(/\s+/g,"_")}_marked.jpg`;link.href=annotRef.current.toDataURL("image/jpeg",0.95);link.click();};

  /* ── Draw exam-style annotations on Quick Mark image ── */
  useEffect(()=>{
    if(!qmResult||!qmImageB64||!qmAnnotRef.current){setQmAnnotReady(false);return;}
    const canvas=qmAnnotRef.current, img=new Image();
    img.onload=()=>{
      canvas.width=img.naturalWidth; canvas.height=img.naturalHeight;
      const ctx=canvas.getContext("2d"); ctx.drawImage(img,0,0);
      const W=canvas.width, H=canvas.height;
      const fs=Math.max(20,Math.round(W*0.025)); // font size proportional to image

      const placements={
        "top-left":     [W*0.04, H*0.06],
        "top-right":    [W*0.70, H*0.06],
        "middle-left":  [W*0.04, H*0.45],
        "middle-right": [W*0.70, H*0.45],
        "bottom-left":  [W*0.04, H*0.88],
        "bottom-right": [W*0.70, H*0.88],
      };

      const usedY={};

      (qmResult.annotations||[]).forEach((ann,idx)=>{
        const colMap={correct:"#3dd68c", incorrect:"#e8473f", partial:"#f5c842"};
        const col=colMap[ann.type]||"#f5c842";
        const basePos=placements[ann.placement]||placements["top-left"];
        let x=basePos[0], y=basePos[1];

        const posKey=ann.placement||"top-left";
        if(usedY[posKey]==null) usedY[posKey]=y;
        else { usedY[posKey]+=fs*2.2; y=usedY[posKey]; }

        ctx.font=`bold ${fs}px Inter,sans-serif`;
        const metrics=ctx.measureText(ann.label);
        const pad=fs*0.45;
        const bw=metrics.width+pad*2, bh=fs*1.5;

        ctx.fillStyle="rgba(255,255,255,0.92)";
        rrect(ctx, x-pad*0.5, y-bh*0.75, bw, bh, bh*0.4);
        ctx.fill();

        ctx.fillStyle=col;
        ctx.fillRect(x-pad*0.5, y-bh*0.75, 4, bh);

        ctx.fillStyle=col;
        ctx.fillText(ann.label, x+4, y);
      });

      const scoreText=`${qmResult.marksAwarded}${qmResult.marksAvailable!=null?"/"+qmResult.marksAvailable:""}`;
      const sf=Math.max(30,Math.round(W*0.038));
      ctx.font=`bold ${sf}px Playfair Display,serif`;
      const sm=ctx.measureText(scoreText);
      const sx=W-sm.width-W*0.04, sy=H*0.055;
      ctx.fillStyle="rgba(255,255,255,0.94)"; rrect(ctx,sx-12,sy-sf,sm.width+24,sf*1.5,8); ctx.fill();
      ctx.fillStyle=qmResult.percentage>=70?"#3dd68c":qmResult.percentage>=50?"#f5c842":"#e8473f";
      ctx.fillText(scoreText,sx,sy);

      setQmAnnotReady(true);
    };
    img.src=qmImageB64;

                                  {item.status==="pending"  && (item.fileType==="docx"?`${item.wordCount||"?"} words`:`Ready to mark${item.pageCount?` · ${item.pageCount}pp`:""}`)}

                          </div>

          </>

                          <div className="review-mode-icon">✍️</div>
                          <div className="review-mode-title">Manual Assist</div>
                          <div className="review-mode-desc">
                            {offlineMode
                              ?"Offline: Tesseract.js OCR will try to read the paper automatically. If it struggles, you can correct the text before marking."
                              :"AI reads what it can, then flags any questions it's unsure about. You fill those in — then AI marks everything."}

                        </div>
                      </div>

                      {!globalScheme&&(
                        <div className="warn-box">No marking scheme set — Auto-Mark will use general academic standards. Add one in Setup for accurate marking.</div>

                          <div className="col gap8">
                            <button className="btn btn-sm btn-gold" style={{justifyContent:"flex-start",gap:8}}

                        Skip — Auto-Mark Anyway
                      </button>
                    </>

                </div>
              </div>
            </div>
          </>

                  <button className="btn btn-green" onClick={()=>{setSavePaperName(subject||(offlineMode?`Offline ${new Date().toLocaleDateString("en-GB")}`:"")); setSaveStudentName(results?.studentName||studentName||"");setShowSaveModal(true);}}><Ic d={I.folderplus} size={15}/> Save to Class</button>
                </div>
              </div>

                {/* Filtered folder list */}
                {(()=>{
                  const q=(folderSearch||"").toLowerCase();
                  const entries=Object.entries(classes).filter(([pid,paper])=>{
                    if(!q) return true;
                    if(paper.name.toLowerCase().includes(q)) return true;
                    if((paper.subject||"").toLowerCase().includes(q)) return true;

                  return entries.map(([pid,paper])=>{
                  const isOpen=expandedPaper===pid;
                  const sts=paper.students||[];
                  const filteredSts=q?sts.filter(s=>s.name.toLowerCase().includes(q)||paper.name.toLowerCase().includes(q)||(!q)):sts;
                  const avgPct=sts.length?Math.round(sts.reduce((s,st)=>s+(st.results?.percentage||0),0)/sts.length):0;
                  const qIds=getAllQIds(sts);
                  return(

                                  </div>

                            </div>

                                      <th style={{textAlign:"center"}}>%</th>
                                      <th style={{textAlign:"center"}}>Grade</th>
                                      {qIds.map(id=><th key={id} style={{textAlign:"center"}}>{id}</th>)}
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {sts.map(st=>{
                                      const qMap={};(st.results.questions||[]).forEach(q=>{qMap[q.id]=q;});
                                      const pct=st.results.percentage||0;
                                      return(
                                        <tr key={st.id}>
                                          <td><strong>{st.name}</strong></td>
                                          <td style={{textAlign:"center",color:"var(--text2)"}}>{st.results.totalScore??'—'}/{st.results.maxScore??'?'}</td>
                                          <td style={{textAlign:"center",fontWeight:700,color:pctColor(pct)}}>{pct}%</td>
                                          <td style={{textAlign:"center",fontWeight:700,color:pctColor(pct)}}>{st.results.grade||'—'}</td>
                                          {qIds.map(id=>{
                                            const q=qMap[id];
                                            if(!q)return<td key={id} className="cell-n">—</td>;
                                            const cls=q.correct?"cell-c":q.marksAwarded>0?"cell-p":"cell-w";
                                            return(
                                              <td key={id} className={cls}>
                                                {q.marksAwarded}/{q.marksAvailable}
                                                {q.misconception&&<div style={{fontSize:"0.6rem",color:"var(--red)",marginTop:1}}>⚠</div>}
                                              </td>
                                            );
                                          })}
                                        </tr>
                                      );
                                    })}
                                    {/* Averages */}
                                    <tr className="avg-row">
                                      <td style={{color:"var(--text3)",fontSize:"0.72rem",textTransform:"uppercase",letterSpacing:1}}>Class Avg</td>

                                      <td style={{textAlign:"center",fontWeight:700,color:pctColor(avgPct)}}>{avgPct}%</td>
                                      <td style={{textAlign:"center",color:"var(--text3)"}}>—</td>

                                        const qs=sts.map(st=>(st.results?.questions||[]).find(q=>q.id===id)).filter(Boolean);
                                        const marks=qs.map(q=>q.marksAwarded||0);
                                        const avail=qs[0]?.marksAvailable||0;
                                        const avg=marks.length?Math.round(marks.reduce((a,b)=>a+b,0)/marks.length*10)/10:null;
                                        const cls=avg!=null&&avail>0?(avg/avail>=.8?"cell-c":avg/avail>=.5?"cell-p":"cell-w"):"cell-n";
                                        return<td key={id} className={cls}>{avg!=null?`${avg}/${avail}`:"—"}</td>;
                                      })}
                                    </tr>
                                  </tbody>
                                </table>
                              </div>
                              <div className="row gap8" style={{justifyContent:"flex-end"}}>
                                <button className="btn btn-green btn-sm" onClick={()=>exportToExcel(paper)}><Ic d={I.xlsx} size={13}/> Export to Excel</button>
                              </div>
                            </div>

                            <div className="col gap12">
                              <div style={{fontSize:"0.78rem",color:"var(--text2)",marginBottom:4}}>Most common mistakes across {sts.length} students. <strong style={{color:"var(--red)"}}>Red = less than 50% correct.</strong></div>

                                const allQs=sts.map(st=>(st.results?.questions||[]).find(q=>q.id===qid)).filter(Boolean);
                                if(!allQs.length)return null;
                                const wrong=allQs.filter(q=>!q.correct);
                                const wrongPct=Math.round((wrong.length/allQs.length)*100);
                                const misconceptions=allQs.map(q=>q.misconception).filter(Boolean);
                                const miscCounts={};misconceptions.forEach(m=>{miscCounts[m]=(miscCounts[m]||0)+1;});
                                const topMisc=Object.entries(miscCounts).sort((a,b)=>b[1]-a[1]).slice(0,3);
                                const avgMarks=allQs.length?Math.round(allQs.reduce((s,q)=>s+(q.marksAwarded||0),0)/allQs.length*10)/10:0;

                                return(
                                  <div key={qid} className="card card-pad" style={{borderLeft:`3px solid ${isWeak?"var(--red)":"var(--border)"}`}}>

                                        <span style={{fontWeight:700,fontSize:"0.9rem"}}>{qid}</span>

                                        {isWeak&&<span style={{marginLeft:8,fontSize:"0.68rem",fontWeight:700,padding:"1px 6px",borderRadius:99,background:"rgba(232,71,63,0.12)",color:"var(--red)"}}>WEAK POINT</span>}
                                      </div>
                                      <div style={{fontSize:"0.85rem",fontWeight:700,color:isWeak?"var(--red)":"var(--text2)"}}>
                                        {wrongPct}% incorrect
                                      </div>
                                    </div>
                                    {topMisc.length>0&&(
                                      <div className="col gap4">
                                        {topMisc.map(([m,count],i)=>(
                                          <div key={i} style={{fontSize:"0.78rem",display:"flex",gap:8,alignItems:"center"}}>
                                            <span style={{color:"var(--red)",fontWeight:700,minWidth:18}}>{count}×</span>
                                            <span style={{color:"var(--text2)"}}>{m}</span>
                                          </div>
                                        ))}
                                      </div>
                                    )}
                                    {!topMisc.length&&wrong.length>0&&(
                                      <div style={{fontSize:"0.75rem",color:"var(--text3)"}}>
                                        {wrong.length} student{wrong.length!==1?"s":""} answered incorrectly — no specific misconception data recorded.
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          )}
                          {classView==="table"&&sts.length===0&&<div className="info-box">Add students to see the topic breakdown table.</div>}
                        </div>
                      )}
                    </div>
                  );
                  });
                })()}
                </>
              )}
            </div>
          </>
        )}

        {/* TOPICEXTRACTOR—maintab */}
        {tab==="topicextractor"&&(
          <>
            <div className="topbar">

                </div>

                  <div className="row gap8">

                    }}>⬇ CSV</button>

                  <div className="field-label">Year Group</div>
                  <input value={topicYear} onChange={e=>setTopicYear(e.target.value)} placeholder="e.g. Year 10, KS4"/>

              </div>

                  <button className={`toggle-opt ${topicExtractionMode==="local"?"on":""}`} onClick={()=>setTopicExtractionMode("local")}>
                    ✈ Local — instant, offline
                  </button>
                  <button className={`toggle-opt ${topicExtractionMode==="ai"?"on":""}`} onClick={()=>setTopicExtractionMode("ai")}>
                    🤖 AI — smarter, needs key
                  </button>
                </div>
                <div className="dim small" style={{flex:1}}>
                  {topicExtractionMode==="local"
                    ?"Detects numbered/lettered codes (1A, 2.1, Q3a) instantly — no internet needed"

                </div>

                      setTopicFiles(prev=>[...prev,...dropped.filter(f=>!prev.some(p=>p.name===f.name))]);
                    }}
                    style={{
                      border:`2px dashed ${topicDragOver?"var(--blue)":"var(--border)"}`,
                      borderRadius:"var(--radius)",
                      padding:"28px 20px",
                      textAlign:"center",

              {topicOcrBusy&&(

                    <span style={{fontSize:"0.82rem",fontWeight:600,color:"var(--blue)"}}>
                      <span className="spinner-sm" style={{verticalAlign:"middle",marginRight:6}}/>

                    </span>
                    <span style={{fontSize:"0.82rem",fontWeight:700,color:"var(--blue)"}}>{topicOcrProgress}%</span>
                  </div>
                  <div style={{height:6,background:"var(--inset)",borderRadius:99,overflow:"hidden"}}>
                    <div style={{height:"100%",width:topicOcrProgress+"%",background:"linear-gradient(90deg,#6c8ff5,#7c3aed)",borderRadius:99,transition:"width 0.3s"}}/>

                    setTopicExtractBusy(true);
                    try {
                      let rawText = topicInput;
                      if(topicFiles.length>0){
                        const fileText = await processTopicFiles(topicFiles);
                        rawText = [rawText, fileText].filter(Boolean).join("\n\n");
                        setTopicSourceText(rawText);
                      }
                      if(!rawText.trim()){setTopicExtractBusy(false);return;}
                      let rows;
                      if(topicExtractionMode==="ai"&&apiReady){
                        rows = await extractTopicsWithAI(rawText);
                      } else {
                        await new Promise(r=>setTimeout(r,80));
                        rows = extractTopics(rawText);
                      }
                      setTopicRows(rows);
                    } catch(e) {
                      setError("Topic extraction failed: "+e.message);
                    }
                    setTopicExtractBusy(false);
                  }}>
                  {topicExtractBusy
                    ?"⏳ Extracting…"

                      <div className="dim small">All cells are editable. Click any code or topic to change it.</div>

                        const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(rows.join("\n"));
                        a.download=`${topicSubject||"topics"}_${new Date().toLocaleDateString("en-GB").replace(/\//g,"-")}.csv`;a.click();
                      }}>⬇ CSV</button>
                      <button className="btn btn-blue btn-sm" onClick={exportTopicsToXLSX}>
                        <Ic d={I.xlsx} size={14}/> Export Excel
                      </button>
                    </div>
                  </div>

                  {/* Table */}
                  <div style={{overflowX:"auto",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.8rem"}}>
                      <thead>
                        <tr style={{background:"var(--inset)"}}>
                          {[
                            {h:"Code",       w:90},
                            {h:"Topic / Description", w:"auto"},
                            {h:"Section / Unit",      w:160},
                            {h:"Marks",      w:72},
                            {h:"",           w:36},
                          ].map((col,i)=>(
                            <th key={i} style={{padding:"9px 12px",textAlign:"left",fontWeight:700,color:"var(--text2)",borderBottom:"2px solid var(--border)",whiteSpace:"nowrap",fontSize:"0.74rem",width:col.w}}>
                              {col.h}
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {topicRows.map((row,ri)=>(
                          <tr key={row.id} style={{borderBottom:"1px solid var(--border)",transition:"background 0.1s"}}
                            onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.03)"}
                            onMouseLeave={e=>e.currentTarget.style.background=""}>
                            <td style={{padding:"5px 10px"}}>
                              <input
                                value={row.code}

                            </td>
                            <td style={{padding:"5px 10px"}}>
                              <input

                                  border:"1px solid transparent",borderRadius:4,padding:"3px 6px",transition:"border-color 0.15s"}}

                                onBlur={e=>e.target.style.borderColor="transparent"}/>
                            </td>
                            <td style={{padding:"5px 10px",textAlign:"center"}}>
                              <input
                                value={row.marks||""}
                                onChange={e=>setTopicRows(prev=>prev.map((r,i)=>i===ri?{...r,marks:e.target.value}:r))}

                                style={{width:50,textAlign:"center",fontSize:"0.78rem",

                                  transition:"color 0.1s"}}

                                onMouseLeave={e=>e.target.style.color="var(--text4)"}

                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  {/* Add row + summary */}
                  <div className="row-between" style={{flexWrap:"wrap",gap:8}}>

                    <div className="dim small">
                      {topicRows.length} rows · Excel export includes: Code, Topic, Section, Subject, Year Group, Marks

                        </div>
                      ))}
                    </div>
                    <div className="dim small">AI mode works on any text format — even free-flowing paragraphs.</div>
                  </div>
                </div>
              )}

            </div>
          </>

                  <div className="page-title">Your Account</div>

                </div>
              </div>
            </div>
            <div className="content col gap16">

              {/* Profile card */}
              {teacherName?(
                <div className="profile-card">

                    <div className="profile-name">{teacherName}</div>
                    <div className="profile-meta">{[teacherDept,teacherSchool].filter(Boolean).join(" · ") || "No department set"}</div>
                    <div className={`role-badge role-${teacherRole}`}>
                      {teacherRole==="hod"?"👑 Head of Department":teacherRole==="admin"?"🏫 School Admin":"👤 Teacher"}

                    <div className="dim small">{teacherPin?"PIN set":"No PIN"}</div>
                  </div>

                    <div className="field-label">Role</div>

                      <option value="hod">Head of Department</option>
                      <option value="admin">School Admin</option>
                    </select>
                  </div>

                    <div className="field-label">Department</div>
                    <input defaultValue={teacherDept} id="acc-dept" placeholder="e.g. Mathematics, Science"/>
                  </div>
                  <div className="field">
                    <div className="field-label">School</div>
                    <input defaultValue={teacherSchool} id="acc-school" placeholder="e.g. St Mary's Academy"/>
                  </div>
                </div>
                <div className="sep"/>
                <div className="card-title" style={{marginBottom:4}}>PIN Lock</div>
                <div className="muted small">Set a 4-digit PIN to lock NovaVista when you're away from your computer. Leave blank for no lock.</div>
                <div className="g2 gap12">
                  <div className="field">
                    <div className="field-label">New PIN (4 digits, or blank)</div>
                    <input id="acc-pin" type="password" maxLength={4} placeholder="••••" className="pin-input" style={{maxWidth:120}}/>
                  </div>
                </div>
                <div className="row gap10">
                  <button className="btn btn-red btn-lg" onClick={()=>{
                    const n=document.getElementById("acc-name").value.trim();
                    const d=document.getElementById("acc-dept").value.trim();
                    const s=document.getElementById("acc-school").value.trim();
                    const p=document.getElementById("acc-pin").value.trim();
                    const r=document.getElementById("acc-role").value;
                    if(!n){setError("Please enter your name.");return;}
                    saveAccount(n,d,s,p,r);
                    setPinUnlocked(true);
                  }}>
                    Save Profile
                  </button>
                  {teacherPin&&<button className="btn btn-ghost" onClick={()=>{
                    setPinUnlocked(false);
                  }}>🔒 Lock Now</button>}
                </div>
              </div>

              <div className="info-box">
                🔒 Your profile, PIN, and all marking data are stored only in <strong>this browser on this device</strong>. Nothing is sent to any server. To move to another computer, use the School Sync folder feature.
              </div>

              {/* ── Demo Mode Notice ── */}
              <div className="info-box" style={{borderColor:"rgba(61,214,140,0.3)",background:"rgba(61,214,140,0.06)"}}>
                🚀 <strong>Demo Mode — All features unlocked.</strong> School Sync, department analysis, and all marking features are fully available. Licence system will be enabled before public launch.
              </div>

              {/* ── Secret admin section — key generator (only visible if you know the URL) ── */}

                    </div>
                    <div className="field"><div className="field-label">Expiry Year</div>
                      <input id="kg-year" type="number" defaultValue={new Date().getFullYear()+1} min="2025" max="2040"/>
                    </div>
                    <div className="field"><div className="field-label">Expiry Month</div>
                      <select id="kg-month">
                        {["01","02","03","04","05","06","07","08","09","10","11","12"].map(m=><option key={m} value={m}>{m}</option>)}
                      </select>
                    </div>
                  </div>
                  <button className="btn btn-ghost" style={{borderColor:"rgba(163,131,250,0.3)",color:"var(--purple)"}} onClick={()=>{

                    const school = document.getElementById("kg-school").value.trim().toUpperCase().replace(/\s+/g,"").slice(0,8);
                    const year   = document.getElementById("kg-year").value;
                    const month  = document.getElementById("kg-month").value;
                    if(!school){alert("Enter a school code.");return;}
                    const key = generateKey(tier,year,month,school);

                  }}>Generate & Copy Key</button>

                </div>
                {!termsAccepted&&<div className="warn-box" style={{fontSize:"0.8rem"}}>⚠ You must accept the terms to use NovaVista.</div>}
              </div>

            </div>
          </>
        )}

        {/* SCHOOLSYNC */}

              </div>

                    {n:1, title:"School creates one shared folder", desc:"IT department creates a folder on the school network drive, SharePoint, or OneDrive that all teachers can access. e.g. S:\\NovaVista\\ or OneDrive\\NovaVista\\"},
                    {n:2, title:"Each teacher connects their copy of NovaVista", desc:"Every teacher clicks Connect School Folder and picks that shared folder. Chrome remembers the permission — they only need to do this once."},
                    {n:3, title:"Marking saves automatically", desc:"After marking papers, clicking Sync saves your data as yourname.json in the shared folder. Only your own file — other teachers' data isn't visible to you."},
                    {n:4, title:"HOD / Admin loads all files", desc:"The Head of Department or Admin opens School Sync, connects the same folder, and clicks Load All Teachers. NovaVista reads all .json files and builds the full school analysis."},

                    <div key={s.n} className="sync-step-card">
                      <div className="sync-step-num">{s.n}</div>
                      <div className="sync-step-body">
                        <div className="sync-step-title">{s.title}</div>
                        <div className="sync-step-desc">{s.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="warn-box mt4">Requires Chrome or Edge browser — the File System Access API is not available in Firefox or Safari.</div>

                  </button>
