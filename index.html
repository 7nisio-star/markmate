                        2.1 Algebra and expressions &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→&nbsp; Code: <strong style={{color:"var(--blue)"}}>2.1</strong><br/>
                        Q3a) Calculate the gradient &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→&nbsp; Code: <strong style={{color:"var(--blue)"}}>Q3A</strong><br/>
                        Topic 4: Waves and light &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→&nbsp; Code: <strong style={{color:"var(--blue)"}}>T4</strong>
                      </div>
                    </div>
                  )}
                </div>
              )}

            </div>
          </>
        )}

        {showTerms&&(
          <div className="modal-backdrop" style={{zIndex:9999,backdropFilter:"blur(8px)"}}>
            <div className="modal" style={{maxWidth:600,maxHeight:"85vh",overflow:"hidden",display:"flex",flexDirection:"column"}}>
              <div className="modal-title" style={{fontSize:"1.1rem"}}>📋 NovaVista — Terms of Use &amp; Data Privacy</div>
              <div className="modal-sub" style={{marginBottom:8}}>Please read and accept before using NovaVista.</div>
              <div style={{overflowY:"auto",flex:1,padding:"0 2px",fontSize:"0.82rem",lineHeight:1.75,color:"var(--text2)"}}>
                <div style={{fontWeight:700,color:"var(--text1)",marginBottom:4,marginTop:8}}>1. Who We Are</div>
                <div>NovaVista is developed by DM Venture &amp; Insights. Queries: <strong>hello@novavista.ai</strong></div>
                <div style={{fontWeight:700,color:"var(--text1)",marginBottom:4,marginTop:12}}>2. What This App Does</div>
                <div>NovaVista helps teachers mark student papers using AI. Paper images and mark schemes are sent to your chosen AI provider for processing.</div>
                <div style={{fontWeight:700,color:"var(--text1)",marginBottom:4,marginTop:12}}>3. Data We Process</div>
                <div style={{paddingLeft:12,borderLeft:"2px solid var(--border)"}}>
                  <div>• <strong>Student work images</strong> — sent to AI provider for marking. Not stored by us.</div>
                  <div>• <strong>Teacher profile</strong> — name, school, subject, PIN — stored locally on your device only.</div>
                  <div>• <strong>Class rosters &amp; results</strong> — stored locally on your device only.</div>
                </div>
                <div style={{fontWeight:700,color:"var(--text1)",marginBottom:4,marginTop:12}}>4. Legal Basis (UK GDPR)</div>
                <div>Processing is carried out under UK GDPR Article 6(1)(e) — public task in education. By accepting you confirm:</div>
                <div style={{paddingLeft:12,borderLeft:"2px solid var(--border)",marginTop:6}}>
                  <div>• You are an authorised teacher or staff member at your institution</div>
                  <div>• Your school has been informed that AI tools are used for marking assistance</div>
                  <div>• You will not submit images containing sensitive special-category data</div>
                  <div>• Results are AI-assisted and must be reviewed by a qualified teacher</div>
                </div>
                <div style={{fontWeight:700,color:"var(--text1)",marginBottom:4,marginTop:12}}>5. AI Provider Data Processing</div>
                <div>Images are sent to your selected AI provider under their own privacy policy. For maximum UK GDPR compliance, use <strong>Microsoft Azure OpenAI</strong> (your school's instance) or <strong>Local mode</strong>.</div>
                <div style={{paddingLeft:12,borderLeft:"2px solid var(--border)",marginTop:6}}>
                  <div>• Anthropic: anthropic.com/privacy &nbsp;·&nbsp; Google: policies.google.com/privacy</div>
                  <div>• OpenAI: openai.com/policies/privacy-policy &nbsp;·&nbsp; Microsoft: microsoft.com/en-gb/privacy</div>
                </div>
                <div style={{fontWeight:700,color:"var(--text1)",marginBottom:4,marginTop:12}}>6. Data Retention</div>
                <div>All data is held <strong>on your device only</strong> in browser localStorage. Delete anytime via <em>Privacy &amp; Data → Danger Zone → Clear All Data</em>. No data is sent to DM Venture &amp; Insights servers.</div>
                <div style={{fontWeight:700,color:"var(--text1)",marginBottom:4,marginTop:12}}>7. Your Rights (UK GDPR)</div>
                <div>You have rights to access, rectification, erasure, portability, and objection. Since all data is local, exercise most rights by clearing browser data. For AI-provider data, contact the relevant provider.</div>
                <div style={{fontWeight:700,color:"var(--text1)",marginBottom:4,marginTop:12}}>8. Safeguarding</div>
                <div>Do not upload images containing student faces, full names on their own, or any safeguarding-sensitive content. NovaVista is for marking written academic work only.</div>
                <div style={{fontWeight:700,color:"var(--text1)",marginBottom:4,marginTop:12}}>9. Licence</div>
                <div>NovaVista is licenced software. Unauthorised copying, redistribution, or reverse engineering is prohibited under UK copyright law (CDPA 1988).</div>
                <div style={{fontWeight:700,color:"var(--text1)",marginBottom:4,marginTop:12}}>10. Changes to These Terms</div>
                <div>Material changes will require re-acceptance on next use. Last updated: April 2026.</div>
                <div style={{marginTop:16,padding:"10px 14px",background:"rgba(108,143,245,0.08)",border:"1px solid rgba(108,143,245,0.2)",borderRadius:"var(--radius-sm)",fontSize:"0.79rem"}}>
                  By clicking <strong>Accept &amp; Continue</strong> you confirm you are an authorised member of staff, you have read these terms, and you agree to use NovaVista in accordance with your school's data protection policy and UK GDPR obligations.
                </div>
              </div>
              <div className="row gap10" style={{marginTop:14,paddingTop:12,borderTop:"1px solid var(--border)"}}>
                <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>setShowTerms(false)} disabled={!termsAccepted}>
                  {termsAccepted?"Close":"Cancel"}
                </button>
                <button className="btn btn-blue" style={{flex:2}} onClick={acceptTerms}>
                  ✓ Accept &amp; Continue
                </button>
              </div>
            </div>
          </div>
        )}

        {showClearConfirm&&(
          <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)setShowClearConfirm(false);}}>
            <div className="modal">
              <div className="modal-title" style={{color:"var(--red)"}}>⚠ Clear All Data?</div>
              <div className="modal-sub">This will permanently delete your class roster, all archived results, mark logs and preferences from this browser. Scanned images (session-only) are not affected.</div>
              <div className="danger-zone" style={{marginBottom:0}}>
                <div className="danger-desc" style={{marginBottom:0}}>
                  <strong>Will be deleted:</strong> {classRoster.length} roster entries · {Object.keys(classes).length} class folders · {Object.values(classes).reduce((s,p)=>s+p.students.length,0)} student records · {saved.length} mark log entries · {corrections.length} training corrections
                </div>
              </div>
              <div className="modal-actions">
                <button className="btn btn-ghost" onClick={()=>setShowClearConfirm(false)}>Cancel</button>
                <button className="btn btn-red" onClick={clearAllData}><Ic d={I.trash} size={14}/> Yes, Delete Everything</button>
              </div>
            </div>
          </div>
        )}
      {showKeyModal&&(
        <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)setShowKeyModal(false);}}>
          <div className="modal">
            <div className="modal-title">AI Provider</div>
            <div className="modal-sub">Choose your AI engine — switch anytime in Privacy &amp; Data.</div>

            {/* 5-way quick picker */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,marginBottom:14}}>
              {[
                {mode:"cloud",  icon:"🟣", label:"Claude"},
                {mode:"proxy",  icon:"🔒", label:"Proxy"},
                {mode:"gemini", icon:"✦",  label:"Gemini"},
                {mode:"openai", icon:"⬡",  label:"Copilot"},
                {mode:"local",  icon:"🖥️", label:"Local"},
              ].map(o=>(
                <div key={o.mode}
                  className={`api-mode-card ${apiMode===o.mode?"selected-cloud":""}`}
                  style={{
                    padding:"10px 6px",textAlign:"center",cursor:"pointer",
                    ...(apiMode===o.mode&&o.mode==="local"   ?{borderColor:"var(--green)",background:"var(--green-dim)"}:{}),
                    ...(apiMode===o.mode&&o.mode==="gemini"  ?{borderColor:"#f9ab00",background:"rgba(249,171,0,0.1)"}:{}),
                    ...(apiMode===o.mode&&o.mode==="openai"  ?{borderColor:"#74aa9c",background:"rgba(116,170,156,0.1)"}:{}),
                  }}
                  onClick={()=>setApiMode(o.mode)}>
                  <div style={{fontSize:"1.3rem",marginBottom:3}}>{o.icon}</div>
                  <div style={{fontSize:"0.72rem",fontWeight:700,color:"var(--text2)"}}>{o.label}</div>
                </div>
              ))}
            </div>

            {/* Claude */}
            {apiMode==="cloud"&&(
              <div className="field">
                <div className="field-label">Anthropic API Key</div>
                <div className="row gap8">
                  <input type={showKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)}
                    placeholder="sk-ant-api03-…" className="key-modal-input" style={{flex:1}}/>
                  <button className="btn btn-ghost btn-icon" onClick={()=>setShowKey(s=>!s)}><Ic d={showKey?I.eyeoff:I.eye} size={16}/></button>
                </div>
                {keySet?<div className="info-box mt8">✓ Claude key set — ready to mark</div>
                  :<div className="dim small mt4">Free key at <a href="https://console.anthropic.com" target="_blank" style={{color:"var(--blue)"}}>console.anthropic.com</a></div>}
              </div>
            )}

            {/* Proxy */}
            {apiMode==="proxy"&&(
              <div className="field">
                <div className="field-label" style={{color:"var(--green)"}}>Proxy Server URL</div>
                <input value={proxyUrl} onChange={e=>setProxyUrl(e.target.value)} placeholder="https://novavista-proxy.….workers.dev"/>
                {proxySet?<div className="info-box mt8">✓ Proxy set — no key needed</div>
                  :<div className="dim small mt4">Deploy your Cloudflare Worker — see Privacy &amp; Data for instructions.</div>}
              </div>
            )}

            {/* Gemini */}
            {apiMode==="gemini"&&(
              <div className="field">
                <div className="field-label" style={{color:"#f9ab00"}}>✦ Google Gemini API Key</div>
                <div className="row gap8">
                  <input type={showKey?"text":"password"} value={geminiKey} onChange={e=>setGeminiKey(e.target.value)}
                    placeholder="AIza…" className="key-modal-input" style={{flex:1}}/>
                  <button className="btn btn-ghost btn-icon" onClick={()=>setShowKey(s=>!s)}><Ic d={showKey?I.eyeoff:I.eye} size={16}/></button>
                </div>
                {geminiSet?<div className="info-box mt8">✓ Gemini key set</div>
                  :<div className="dim small mt4">Free key at <a href="https://aistudio.google.com/app/apikey" target="_blank" style={{color:"var(--blue)"}}>aistudio.google.com</a> — no credit card</div>}
              </div>
            )}

            {/* OpenAI / Copilot */}
            {apiMode==="openai"&&(
              <div className="field">
                <div className="field-label" style={{color:"#74aa9c"}}>⬡ OpenAI API Key (GPT-4o / Copilot)</div>
                <div className="row gap8">
                  <input type={showKey?"text":"password"} value={openaiKey} onChange={e=>setOpenaiKey(e.target.value)}
                    placeholder="sk-…" className="key-modal-input" style={{flex:1}}/>
                  <button className="btn btn-ghost btn-icon" onClick={()=>setShowKey(s=>!s)}><Ic d={showKey?I.eyeoff:I.eye} size={16}/></button>
                </div>
                {openaiSet?<div className="info-box mt8">✓ OpenAI key set — using GPT-4o</div>
                  :<div className="dim small mt4">Key at <a href="https://platform.openai.com/api-keys" target="_blank" style={{color:"var(--blue)"}}>platform.openai.com</a></div>}
              </div>
            )}

            {/* Local */}
            {apiMode==="local"&&(
              <div className="col gap10">
                <div className="field">
                  <div className="field-label">Ollama Endpoint</div>
                  <div className="endpoint-field">
                    <input value={localEndpoint} onChange={e=>{setLocalEndpoint(e.target.value);setEndpointTestResult(null);}} placeholder="http://localhost:11434"/>
                    <button className="btn btn-ghost btn-sm" disabled={endpointTesting} onClick={testLocalEndpoint}>
                      {endpointTesting?<><span className="spinner-sm"/> Testing…</>:"Test"}
                    </button>
                  </div>
                  {endpointTestResult&&<span className={`endpoint-test-result mt4 ${endpointTestResult==="ok"?"test-ok":"test-fail"}`} style={{marginTop:6}}>{endpointTestResult==="ok"?"✓ Connected":"✗ Cannot reach Ollama"}</span>}
                </div>
                <div className="field">
                  <div className="field-label">Vision Model</div>
                  <input value={localModel} onChange={e=>setLocalModel(e.target.value)} placeholder="llava"/>
                </div>
                <div className="info-box">No data leaves your device. Run: <code style={{background:"var(--border)",padding:"1px 5px",borderRadius:3,fontSize:"0.78rem"}}>OLLAMA_ORIGINS=* ollama serve</code></div>
              </div>
            )}

            <div className="modal-actions">
              <button className="btn btn-ghost btn-sm" onClick={()=>{setShowKeyModal(false);setTab("privacy");}}>
                <Ic d={I.shield} size={14}/> Full Settings
              </button>
              <button className="btn btn-ghost" onClick={()=>setShowKeyModal(false)}>Done</button>
            </div>
          </div>
        </div>
      )}

      {/* QUICKMARK→SAVETOCLASSMODAL */}
      {showQmSaveModal&&(
        <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)setShowQmSaveModal(false);}}>
          <div className="modal">
            <div className="modal-title">Save to Class Folder 📁</div>
            <div className="modal-sub">Saves the original question image, annotated marked paper, and personalised feedback into a class folder. Access everything under <strong>Class Folders</strong>.</div>
            <div className="col gap14">
              <div className="field">
                <div className="field-label">Paper / Class Name</div>
                <input value={qmSavePaper} onChange={e=>setQmSavePaper(e.target.value)} placeholder="e.g. Maths Paper 1 · Biology Q5 · Science Test"/>
                <div style={{fontSize:"0.72rem",color:"var(--text3)",marginTop:4}}>Use the same name for all students in this paper — becomes the folder name.</div>
              </div>
              <div className="field roster-select-wrap">
                <div className="field-label">Student Name</div>
                <input value={qmSaveStudent}
                  onChange={e=>{setQmSaveStudent(e.target.value);setShowQmRosterDrop(true);}}
                  onFocus={()=>setShowQmRosterDrop(true)}
                  onBlur={()=>setTimeout(()=>setShowQmRosterDrop(false),150)}
                  placeholder={classRoster.length>0?"Type or select from roster…":"e.g. Emma Johnson"}/>
                {showQmRosterDrop&&classRoster.length>0&&(
                  <div className="roster-dropdown">
                    {classRoster.filter(r=>!qmSaveStudent||r.name.toLowerCase().includes(qmSaveStudent.toLowerCase())).slice(0,10).map((r,i)=>(
                      <div key={i} className={`roster-option ${r.name===qmSaveStudent?"highlight":""}`} onMouseDown={()=>setQmSaveStudent(r.name)}>
                        <Ic d={I.users} size={13} color="var(--text3)"/> {r.name}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Preview what will be saved */}
              <div className="inset" style={{padding:"12px 14px"}}>
                <div className="field-label" style={{marginBottom:8}}>What gets saved:</div>
                <div className="col gap6" style={{fontSize:"0.8rem",color:"var(--text2)"}}>
                  <div className="row gap8"><span style={{color:qmImageB64?"var(--green)":"var(--text4)"}}>📷</span> <span style={{color:qmImageB64?"var(--text)":"var(--text4)"}}>{qmImageB64?"Original question photo":"No image (text-only mark)"}</span></div>
                  <div className="row gap8"><span style={{color:qmAnnotReady?"var(--green)":"var(--text4)"}}>📝</span> <span style={{color:qmAnnotReady?"var(--text)":"var(--text4)"}}>{qmAnnotReady?"Annotated paper with B/M/A marks":"No annotated image (no photo uploaded)"}</span></div>
                  <div className="row gap8"><span style={{color:"var(--blue)"}}>📄</span> <span>Personalised feedback document (HTML)</span></div>
                  <div className="row gap8"><span style={{color:"var(--gold)"}}>📊</span> <span>Score: {qmResult?.marksAwarded}{qmResult?.marksAvailable!=null?"/"+qmResult.marksAvailable:""} ({qmResult?.percentage||0}%)</span></div>
                </div>
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setShowQmSaveModal(false)}>Cancel</button>
              <button className="btn btn-blue" disabled={!qmSavePaper.trim()||!qmSaveStudent.trim()} onClick={saveQmToClass}>
                <Ic d={I.folderplus} size={15}/> Save to Folder
              </button>
            </div>
          </div>
        </div>
      )}

      {/* SAVETOCLASSMODAL */}
      {showSaveModal&&(
        <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)setShowSaveModal(false);}}>
          <div className="modal">
            <div className="modal-title">Save to Class Folder</div>
            {offlineMode?(
              <div style={{marginBottom:14,padding:"10px 14px",background:"rgba(245,200,66,0.12)",border:"1px solid rgba(245,200,66,0.35)",borderRadius:"var(--radius-sm)",fontSize:"0.82rem",color:"#7a6000"}}>
                ✈️ <strong>Offline Mode</strong> — This will create a temporary folder saved in this browser session. Results are stored locally and marked using your mark scheme.
              </div>
            ):(
              <div className="modal-sub">Saves the original scan, annotated paper, and personalised feedback. View everything under <strong>Class Folders</strong>.</div>
            )}
            <div className="col gap14">
              <div className="field">
                <div className="field-label">Paper / Class Name</div>
                <input value={savePaperName} onChange={e=>setSavePaperName(e.target.value)} placeholder="e.g. Maths Paper 1 · GCSE Biology Mock"/>
                <div style={{fontSize:"0.72rem",color:"var(--text3)",marginTop:4}}>Use the same name for all students in this paper — it becomes the folder name.</div>
              </div>
              <div className="field roster-select-wrap">
                <div className="field-label">Student Name</div>
                {/* Auto-detected hint */}
                {results?.studentName&&results.studentName!==saveStudentName&&(
                  <div className="auto-name-badge" style={{marginBottom:6}}>
                    🤖 AI detected: <strong>{results.studentName}</strong>
                    <button style={{marginLeft:6,background:"none",border:"none",color:"var(--gold)",cursor:"pointer",fontSize:"0.72rem",fontWeight:700,padding:0}} onClick={()=>setSaveStudentName(results.studentName)}>Use this ↑</button>
                  </div>
                )}
                <div className="row gap8">
                  <div style={{flex:1,position:"relative"}}>
                    <input value={saveStudentName} onChange={e=>{setSaveStudentName(e.target.value);setShowRosterDrop(true);}}
                      onFocus={()=>setShowRosterDrop(true)}
                      onBlur={()=>setTimeout(()=>setShowRosterDrop(false),150)}
                      placeholder={classRoster.length>0?"Type or select from roster…":"e.g. Emma Johnson"}/>
                    {showRosterDrop&&classRoster.length>0&&(
                      <div className="roster-dropdown">
                        {classRoster
                          .filter(r=>!saveStudentName||r.name.toLowerCase().includes(saveStudentName.toLowerCase()))
                          .slice(0,10)
                          .map((r,i)=>(
                            <div key={i} className={`roster-option ${r.name===saveStudentName?"highlight":""}`}
                              onMouseDown={()=>setSaveStudentName(r.name)}>
                              <Ic d={I.users} size={13} color="var(--text3)"/> {r.name}
                            </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
                {classRoster.length>0&&(
                  <div className="dim small mt4">
                    {classRoster.length} student{classRoster.length>1?"s":""} in roster — click the field to browse
                  </div>
                )}
              </div>
              {results&&(
                <div className="inset" style={{padding:"12px 14px"}}>
                  <div className="row-between small muted mb8">
                    <span>Score</span>
                    <strong style={{color:pctColor(results.percentage||0)}}>{results.totalScore??'—'}/{results.maxScore??'?'} ({results.percentage??0}%)</strong>
                  </div>
                  <div className="row-between small muted">
                    <span>Grade</span>
                    <strong style={{color:pctColor(results.percentage||0)}}>{results.grade||'—'}</strong>
                  </div>
                </div>
              )}
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setShowSaveModal(false)}>Cancel</button>
              <button className="btn btn-green" disabled={!savePaperName.trim()||!saveStudentName.trim()} onClick={saveStudentToClass}>
                <Ic d={I.folderplus} size={15}/> Save to Folder
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Copyright footer ── */}
      <div style={{
        position:"fixed", bottom:0, left:0, right:0, zIndex:10,
        background:"rgba(11,12,15,0.92)", backdropFilter:"blur(8px)",
        borderTop:"1px solid rgba(255,255,255,0.06)",
        padding:"7px 20px",
        paddingLeft:`calc(var(--sidebar-w) + 20px)`,
        display:"flex", alignItems:"center", justifyContent:"space-between",
        fontSize:"0.68rem", color:"rgba(255,255,255,0.28)",
        fontFamily:"'Inter',sans-serif", letterSpacing:"0.3px",
        pointerEvents:"none", userSelect:"none",
        flexWrap:"wrap", gap:"4px",
      }}>
        <span>© DM Venture &amp; Insights 2026 — NovaVista · Licenced software · Unauthorised use prohibited</span>
        <span style={{color:"rgba(255,255,255,0.15)"}}>All rights reserved · For educational use only</span>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<NovaVista/>);
</script>

<script>
// Hide the boot screen now that React has mounted
(function(){
  var boot = document.getElementById('boot-screen');
  if(boot){
    var bar = document.getElementById('boot-bar');
    if(bar) bar.style.width = '100%';
    setTimeout(function(){
      boot.style.transition = 'opacity 0.4s ease';
      boot.style.opacity = '0';
      setTimeout(function(){ boot.style.display = 'none'; }, 400);
    }, 200);
  }
})();
</script>

<!-- Service worker not used in single-file mode -->
</body>
</html>
