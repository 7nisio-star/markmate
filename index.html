                  <div className={`api-mode-card ${apiMode==="cloud"?"selected-cloud":""}`} onClick={()=>setApiMode("cloud")}>
                    <div className="api-mode-card-badge badge-cloud">Recommended</div>
                    <div className="api-mode-card-icon">☁️</div>
                    <div className="api-mode-card-title">Anthropic Cloud</div>
                    <div className="api-mode-card-desc">Uses Claude via Anthropic's API. Paper images and answers are sent to Anthropic's servers for processing. Highest accuracy — full vision and OCR support.</div>
                  </div>
                  <div className={`api-mode-card ${apiMode==="local"?"selected-local":""}`} onClick={()=>setApiMode("local")}>
                    <div className="api-mode-card-badge badge-local">Most Private</div>
                    <div className="api-mode-card-icon">🖥️</div>
                    <div className="api-mode-card-title">Local Model (Ollama)</div>
                    <div className="api-mode-card-desc">Runs on your computer via Ollama. No data leaves your device. Requires a vision-capable model (e.g. llava, llama3.2-vision) and a capable GPU.</div>
                  </div>
                </div>

                {/* Cloud config */}
                {apiMode==="cloud"&&(
                  <div className="card card-pad col gap10" style={{background:"var(--inset)",border:"1px solid var(--border)"}}>
                    <div className="field-label">Anthropic API Key</div>
                    <div className="row gap8">
                      <input type={showKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)}
                        placeholder="sk-ant-api03-…" className="key-modal-input" style={{flex:1}}/>
                      <button className="btn btn-ghost btn-icon" onClick={()=>setShowKey(s=>!s)}><Ic d={showKey?I.eyeoff:I.eye} size={16}/></button>
                    </div>
                    {keySet
                      ?<div className="info-box">✓ API key is set. Papers and answers will be sent to Anthropic's API for marking.</div>
                      :<div className="warn-box">No API key set. Get one free at <a href="https://console.anthropic.com" target="_blank" style={{color:"var(--blue)"}}>console.anthropic.com</a> — your key never leaves this browser tab.</div>}
                  </div>
                )}

                {/* Local config */}
                {apiMode==="local"&&(
                  <div className="card card-pad col gap12" style={{background:"var(--inset)",border:"1px solid var(--border)"}}>
                    <div className="field-label">Ollama Endpoint</div>
                    <div className="endpoint-field">
                      <input value={localEndpoint} onChange={e=>{setLocalEndpoint(e.target.value);setEndpointTestResult(null);}}
                        placeholder="http://localhost:11434"/>
                      <button className="btn btn-ghost" disabled={endpointTesting} onClick={testLocalEndpoint}>
                        {endpointTesting?<><span className="spinner-sm"/> Testing…</>:"Test Connection"}
                      </button>
                    </div>
                    {endpointTestResult&&(
                      <span className={`endpoint-test-result ${endpointTestResult==="ok"?"test-ok":"test-fail"}`}>
                        {endpointTestResult==="ok"?"✓ Ollama reachable":"✗ Could not connect — is Ollama running?"}
                      </span>
                    )}
                    <div className="field">
                      <div className="field-label">Vision Model Name</div>
                      <input value={localModel} onChange={e=>setLocalModel(e.target.value)} placeholder="e.g. llava, llama3.2-vision, moondream"/>
                    </div>
                    <div className="blue-box">
                      <strong>Setup instructions:</strong> Install <a href="https://ollama.com" target="_blank" style={{color:"var(--blue)"}}>Ollama</a>, then run <code style={{background:"var(--border)",padding:"1px 5px",borderRadius:4,fontSize:"0.8rem"}}>ollama pull llava</code> (or any vision model). Start Ollama — NovaVista will connect automatically. Enable CORS with <code style={{background:"var(--border)",padding:"1px 5px",borderRadius:4,fontSize:"0.8rem"}}>OLLAMA_ORIGINS=* ollama serve</code>.
                    </div>
                    <div className="warn-box" style={{marginTop:0}}>
                      ⚠ Local models have lower OCR accuracy than Claude. Complex handwriting or multi-page booklets may produce less reliable results. PDF marking scheme extraction also requires cloud mode.
                    </div>
                  </div>
                )}
              </div>

              {/* ── What data goes where ── */}
              <div className="card card-pad col gap12">
                <div className="card-title">What Data Goes Where</div>
                <div className="privacy-notice col gap4" style={{padding:0,background:"none",border:"none"}}>
                  {[
                    {icon:"📄", key:"Paper images",    val:apiMode==="local"?"Never leave your device — processed locally":"Sent to Anthropic's API for OCR and marking, then discarded. Not stored by Anthropic.",cloud:true},
                    {icon:"✍️", key:"Student answers",  val:apiMode==="local"?"Processed locally only":"Sent to Anthropic's API for marking only. Anthropic does not retain API data.",cloud:true},
                    {icon:"👤", key:"Student names",    val:"Stored only in your browser's localStorage. Never sent anywhere.",cloud:false},
                    {icon:"📊", key:"Marks & grades",   val:"Stored only in your browser's localStorage. Never sent anywhere.",cloud:false},
                    {icon:"🗝️", key:"API key",          val:apiMode==="local"?"Not needed in local mode":"Stored in browser memory for this session only. Not persisted to disk.",cloud:true},
                    {icon:"🖼️", key:"Annotated papers", val:"Generated in-browser on your device. Downloaded to your computer on request.",cloud:false},
                  ].map((row,i)=>(
                    <div key={i} className="privacy-row">
                      <div className="privacy-icon">{row.icon}</div>
                      <div className="privacy-key">{row.key}</div>
                      <div className="privacy-val">
                        {row.val}
                        {row.cloud&&apiMode==="cloud"&&<span className="pill pill-blue" style={{marginLeft:6,fontSize:"0.67rem"}}>Cloud</span>}
                        {!row.cloud&&<span className="pill pill-green" style={{marginLeft:6,fontSize:"0.67rem"}}>Local only</span>}
                      </div>
                    </div>
                  ))}
                </div>
                {apiMode==="cloud"&&(
                  <div className="warn-box">
                    <strong>UK GDPR note:</strong> Paper images containing student work are sent to Anthropic (USA) for processing. Anthropic's API does not train on submitted data. You should notify students/parents in your school's data processing register. Consider using Local mode for maximum compliance.
                  </div>
                )}
                {apiMode==="local"&&(
                  <div className="info-box">
                    ✓ In local mode, no student data leaves your device. This approach is fully compatible with UK GDPR and school data protection policies with no additional disclosure needed.
                  </div>
                )}
              </div>

              {/* ── Stored data summary ── */}
              <div className="card card-pad col gap12">
                <div className="card-title">Data Stored in This Browser</div>
                <div className="muted small">All data is stored in your browser's localStorage — only on this computer, only accessible to you.</div>
                <div className="col gap8 mt4">
                  {[
                    {icon:"👥", num:classRoster.length, label:"Students in roster", note:"Names only, no images"},
                    {icon:"📁", num:Object.keys(classes).length, label:"Class folders", note:"Results and feedback"},
                    {icon:"✅", num:Object.values(classes).reduce((s,p)=>s+p.students.length,0), label:"Marked papers archived", note:"Marks, grades, feedback — images are session-only"},
                    {icon:"⚡", num:saved.length, label:"Quick mark results", note:"From this and previous sessions"},
                    {icon:"🧠", num:corrections.length, label:"AI training corrections", note:"Corrections you've made — used to improve the model"},
                  ].map((row,i)=>(
                    <div key={i} className="data-stat-row">
                      <div className="data-stat-num" style={{color:row.num>0?"var(--text)":"var(--text4)"}}>{row.num}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:"0.85rem",fontWeight:500,color:"var(--text)"}}>{row.icon} {row.label}</div>
                        <div className="data-stat-note">{row.note}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="row gap8 mt4">
                  <button className="btn btn-ghost btn-sm" onClick={()=>exportToExcel(Object.values(classes)[0]||{name:"Export",students:[]})} disabled={Object.keys(classes).length===0}>
                    <Ic d={I.xlsx} size={14}/> Export All to Excel
                  </button>
                  <button className="btn btn-ghost btn-sm" style={{marginLeft:"auto"}} onClick={()=>setShowClearConfirm(true)}>
                    <Ic d={I.trash} size={13}/> Clear All Stored Data
                  </button>
                </div>
              </div>

              {/* ── Danger zone ── */}
              <div className="danger-zone">
                <div className="danger-title">⚠ Danger Zone</div>
                <div className="danger-desc">Clearing all data permanently removes your class roster, all marked paper results, mark logs, and preferences from this browser. Scanned images are already session-only and not stored. This action cannot be undone.</div>
                <div className="row gap8">
                  <button className="btn btn-ghost btn-sm" style={{borderColor:"rgba(232,71,63,0.3)",color:"var(--red)"}}
                    onClick={()=>setShowClearConfirm(true)}>
                    <Ic d={I.trash} size={13}/> Clear All Student Data
                  </button>
                </div>
              </div>

            </div>
          </>
        )}

        {/* ─────────────────────────
            CLEAR DATA CONFIRM
        ───────────────────────── */}
        {showClearConfirm&&(
          <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)setShowClearConfirm(false);}}>
            <div className="modal">
              <div className="modal-title" style={{color:"var(--red)"}}>⚠ Clear All Data?</div>
              <div className="modal-sub">This will permanently delete your class roster, all archived results, mark logs and preferences from this browser. Scanned images (session-only) are not affected.</div>
              <div className="danger-zone" style={{marginBottom:0}}>
                <div className="danger-desc" style={{marginBottom:0}}>
                  <strong>Will be deleted:</strong> {classRoster.length} roster entries · {Object.keys(classes).length} class folders · {Object.values(classes).reduce((s,p)=>s+p.students.length,0)} student records · {saved.length} mark log entries · {corrections.length} training corrections
                </div>
              </div>
              <div className="modal-actions">
                <button className="btn btn-ghost" onClick={()=>setShowClearConfirm(false)}>Cancel</button>
                <button className="btn btn-red" onClick={clearAllData}><Ic d={I.trash} size={14}/> Yes, Delete Everything</button>
              </div>
            </div>
          </div>
        )}
      {showKeyModal&&(
        <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)setShowKeyModal(false);}}>
          <div className="modal">
            <div className="modal-title">AI Connection</div>
            <div className="modal-sub">Use Anthropic's cloud API for best accuracy, or a local Ollama model for full privacy.</div>

            <div className="api-mode-grid" style={{marginBottom:16}}>
              <div className={`api-mode-card ${apiMode==="cloud"?"selected-cloud":""}`} style={{padding:"12px 14px"}} onClick={()=>setApiMode("cloud")}>
                <div className="api-mode-card-icon" style={{fontSize:"1.2rem",marginBottom:4}}>☁️</div>
                <div className="api-mode-card-title" style={{fontSize:"0.82rem"}}>Anthropic Cloud</div>
              </div>
              <div className={`api-mode-card ${apiMode==="local"?"selected-local":""}`} style={{padding:"12px 14px"}} onClick={()=>setApiMode("local")}>
                <div className="api-mode-card-icon" style={{fontSize:"1.2rem",marginBottom:4}}>🖥️</div>
                <div className="api-mode-card-title" style={{fontSize:"0.82rem"}}>Local Ollama</div>
              </div>
            </div>

            {apiMode==="cloud"&&(
              <div className="field">
                <div className="field-label">Anthropic API Key</div>
                <div className="row gap8">
                  <input type={showKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)}
                    placeholder="sk-ant-api03-…" className="key-modal-input" style={{flex:1}}/>
                  <button className="btn btn-ghost btn-icon" onClick={()=>setShowKey(s=>!s)}><Ic d={showKey?I.eyeoff:I.eye} size={16}/></button>
                </div>
                {keySet
                  ?<div className="info-box mt8">✓ Key set — ready to mark</div>
                  :<div className="dim small mt4">Get yours free at <a href="https://console.anthropic.com" target="_blank" style={{color:"var(--blue)"}}>console.anthropic.com</a>. Stays in this tab only.</div>}
              </div>
            )}

            {apiMode==="local"&&(
              <div className="col gap10">
                <div className="field">
                  <div className="field-label">Ollama Endpoint</div>
                  <div className="endpoint-field">
                    <input value={localEndpoint} onChange={e=>{setLocalEndpoint(e.target.value);setEndpointTestResult(null);}} placeholder="http://localhost:11434"/>
                    <button className="btn btn-ghost btn-sm" disabled={endpointTesting} onClick={testLocalEndpoint}>
                      {endpointTesting?<><span className="spinner-sm"/> Testing…</>:"Test"}
                    </button>
                  </div>
                  {endpointTestResult&&<span className={`endpoint-test-result mt4 ${endpointTestResult==="ok"?"test-ok":"test-fail"}`} style={{marginTop:6}}>{endpointTestResult==="ok"?"✓ Connected":"✗ Cannot reach Ollama"}</span>}
                </div>
                <div className="field">
                  <div className="field-label">Vision Model</div>
                  <input value={localModel} onChange={e=>setLocalModel(e.target.value)} placeholder="llava"/>
                </div>
                <div className="info-box">No data leaves your device. Run: <code style={{background:"var(--border)",padding:"1px 5px",borderRadius:3,fontSize:"0.78rem"}}>OLLAMA_ORIGINS=* ollama serve</code></div>
              </div>
            )}

            <div className="modal-actions">
              <button className="btn btn-ghost btn-sm" onClick={()=>{setShowKeyModal(false);setTab("privacy");}}>
                <Ic d={I.shield} size={14}/> Full Privacy Settings
              </button>
              <button className="btn btn-ghost" onClick={()=>setShowKeyModal(false)}>Done</button>
            </div>
          </div>
        </div>
      )}

      {/* ═══════════════════════════
          QUICK MARK → SAVE TO CLASS MODAL
      ═══════════════════════════ */}
      {showQmSaveModal&&(
        <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)setShowQmSaveModal(false);}}>
          <div className="modal">
            <div className="modal-title">Save to Class Folder 📁</div>
            <div className="modal-sub">Saves the original question image, annotated marked paper, and personalised feedback into a class folder. Access everything under <strong>Class Folders</strong>.</div>
            <div className="col gap14">
              <div className="field">
                <div className="field-label">Paper / Class Name</div>
                <input value={qmSavePaper} onChange={e=>setQmSavePaper(e.target.value)} placeholder="e.g. Maths Paper 1 · Biology Q5 · Science Test"/>
                <div style={{fontSize:"0.72rem",color:"var(--text3)",marginTop:4}}>Use the same name for all students in this paper — becomes the folder name.</div>
              </div>
              <div className="field roster-select-wrap">
                <div className="field-label">Student Name</div>
                <input value={qmSaveStudent}
                  onChange={e=>{setQmSaveStudent(e.target.value);setShowQmRosterDrop(true);}}
                  onFocus={()=>setShowQmRosterDrop(true)}
                  onBlur={()=>setTimeout(()=>setShowQmRosterDrop(false),150)}
                  placeholder={classRoster.length>0?"Type or select from roster…":"e.g. Emma Johnson"}/>
                {showQmRosterDrop&&classRoster.length>0&&(
                  <div className="roster-dropdown">
                    {classRoster.filter(r=>!qmSaveStudent||r.name.toLowerCase().includes(qmSaveStudent.toLowerCase())).slice(0,10).map((r,i)=>(
                      <div key={i} className={`roster-option ${r.name===qmSaveStudent?"highlight":""}`} onMouseDown={()=>setQmSaveStudent(r.name)}>
                        <Ic d={I.users} size={13} color="var(--text3)"/> {r.name}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Preview what will be saved */}
              <div className="inset" style={{padding:"12px 14px"}}>
                <div className="field-label" style={{marginBottom:8}}>What gets saved:</div>
                <div className="col gap6" style={{fontSize:"0.8rem",color:"var(--text2)"}}>
                  <div className="row gap8"><span style={{color:qmImageB64?"var(--green)":"var(--text4)"}}>📷</span> <span style={{color:qmImageB64?"var(--text)":"var(--text4)"}}>{qmImageB64?"Original question photo":"No image (text-only mark)"}</span></div>
                  <div className="row gap8"><span style={{color:qmAnnotReady?"var(--green)":"var(--text4)"}}>📝</span> <span style={{color:qmAnnotReady?"var(--text)":"var(--text4)"}}>{qmAnnotReady?"Annotated paper with B/M/A marks":"No annotated image (no photo uploaded)"}</span></div>
                  <div className="row gap8"><span style={{color:"var(--blue)"}}>📄</span> <span>Personalised feedback document (HTML)</span></div>
                  <div className="row gap8"><span style={{color:"var(--gold)"}}>📊</span> <span>Score: {qmResult?.marksAwarded}{qmResult?.marksAvailable!=null?"/"+qmResult.marksAvailable:""} ({qmResult?.percentage||0}%)</span></div>
                </div>
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setShowQmSaveModal(false)}>Cancel</button>
              <button className="btn btn-blue" disabled={!qmSavePaper.trim()||!qmSaveStudent.trim()} onClick={saveQmToClass}>
                <Ic d={I.folderplus} size={15}/> Save to Folder
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ═══════════════════════════
          SAVE TO CLASS MODAL
      ═══════════════════════════ */}
      {showSaveModal&&(
        <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)setShowSaveModal(false);}}>
          <div className="modal">
            <div className="modal-title">Save to Class Folder</div>
            <div className="modal-sub">Saves the original scan, annotated paper, and personalised feedback. View everything under <strong>Class Folders</strong>.</div>
            <div className="col gap14">
              <div className="field">
                <div className="field-label">Paper / Class Name</div>
                <input value={savePaperName} onChange={e=>setSavePaperName(e.target.value)} placeholder="e.g. Maths Paper 1 · GCSE Biology Mock"/>
                <div style={{fontSize:"0.72rem",color:"var(--text3)",marginTop:4}}>Use the same name for all students in this paper — it becomes the folder name.</div>
              </div>
              <div className="field roster-select-wrap">
                <div className="field-label">Student Name</div>
                {/* Auto-detected hint */}
                {results?.studentName&&results.studentName!==saveStudentName&&(
                  <div className="auto-name-badge" style={{marginBottom:6}}>
                    🤖 AI detected: <strong>{results.studentName}</strong>
                    <button style={{marginLeft:6,background:"none",border:"none",color:"var(--gold)",cursor:"pointer",fontSize:"0.72rem",fontWeight:700,padding:0}} onClick={()=>setSaveStudentName(results.studentName)}>Use this ↑</button>
                  </div>
                )}
                <div className="row gap8">
                  <div style={{flex:1,position:"relative"}}>
                    <input value={saveStudentName} onChange={e=>{setSaveStudentName(e.target.value);setShowRosterDrop(true);}}
                      onFocus={()=>setShowRosterDrop(true)}
                      onBlur={()=>setTimeout(()=>setShowRosterDrop(false),150)}
                      placeholder={classRoster.length>0?"Type or select from roster…":"e.g. Emma Johnson"}/>
                    {showRosterDrop&&classRoster.length>0&&(
                      <div className="roster-dropdown">
                        {classRoster
                          .filter(r=>!saveStudentName||r.name.toLowerCase().includes(saveStudentName.toLowerCase()))
                          .slice(0,10)
                          .map((r,i)=>(
                            <div key={i} className={`roster-option ${r.name===saveStudentName?"highlight":""}`}
                              onMouseDown={()=>setSaveStudentName(r.name)}>
                              <Ic d={I.users} size={13} color="var(--text3)"/> {r.name}
                            </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
                {classRoster.length>0&&(
                  <div className="dim small mt4">
                    {classRoster.length} student{classRoster.length>1?"s":""} in roster — click the field to browse
                  </div>
                )}
              </div>
              {results&&(
                <div className="inset" style={{padding:"12px 14px"}}>
                  <div className="row-between small muted mb8">
                    <span>Score</span>
                    <strong style={{color:pctColor(results.percentage||0)}}>{results.totalScore??'—'}/{results.maxScore??'?'} ({results.percentage??0}%)</strong>
                  </div>
                  <div className="row-between small muted">
                    <span>Grade</span>
                    <strong style={{color:pctColor(results.percentage||0)}}>{results.grade||'—'}</strong>
                  </div>
                </div>
              )}
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setShowSaveModal(false)}>Cancel</button>
              <button className="btn btn-green" disabled={!savePaperName.trim()||!saveStudentName.trim()} onClick={saveStudentToClass}>
                <Ic d={I.folderplus} size={15}/> Save to Folder
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<NovaVista/>);

// Hide the boot screen now that React has mounted
(function(){
  var boot = document.getElementById('boot-screen');
  if(boot){
    var bar = document.getElementById('boot-bar');
    if(bar) bar.style.width = '100%';
    setTimeout(function(){
      boot.style.transition = 'opacity 0.4s ease';
      boot.style.opacity = '0';
      setTimeout(function(){ boot.style.display = 'none'; }, 400);
    }, 200);
  }
})();
</script>
</body>
</html>
